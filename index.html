<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>돼지 힐링 🐷</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; background: #87CEEB; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }
    #bubble {
      position: fixed;
      left: 50%; top: 40%;
      transform: translateX(-50%) translateY(-100%);
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 18px;
      padding: 11px 17px;
      font-family: 'Jua', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      box-shadow: 0 6px 28px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.07);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.28s ease;
      max-width: 200px;
      text-align: center;
      line-height: 1.55;
      white-space: pre-line;
      z-index: 10;
    }
    #bubble.visible { opacity: 1; }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-top: 9px solid rgba(255,255,255,0.82);
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="bubble"><span id="bubble-text"></span></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();

// ── Audio ─────────────────────────────────────────────────
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playBoing() {
  try {
    const ac=getAC(), t=ac.currentTime;
    // main oscillator
    const o=ac.createOscillator(), g=ac.createGain();
    // wobble LFO (gives the rubbery 꼬잉 shimmer)
    const lfo=ac.createOscillator(), lfoG=ac.createGain();
    lfo.frequency.value=22; lfoG.gain.value=38;
    lfo.connect(lfoG); lfoG.connect(o.frequency);
    o.connect(g); g.connect(ac.destination);
    o.type='sine';
    // pitch: swoops up quickly then falls — "꼬↑잉↓"
    o.frequency.setValueAtTime(260,t);
    o.frequency.linearRampToValueAtTime(720,t+0.07);
    o.frequency.exponentialRampToValueAtTime(170,t+0.38);
    // volume: snappy attack, soft tail
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.3,t+0.018);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.42);
    lfo.start(t); lfo.stop(t+0.42);
    o.start(t); o.stop(t+0.42);
  } catch(e) {}
}
let stretchSndTimer=0;
function playStretch() {
  if (stretchSndTimer>0) return;
  stretchSndTimer=14;
  try {
    const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination); o.type='sawtooth';
    o.frequency.setValueAtTime(70,ac.currentTime);
    o.frequency.linearRampToValueAtTime(220,ac.currentTime+0.2);
    g.gain.setValueAtTime(0.07,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2);
    o.start(); o.stop(ac.currentTime+0.2);
  } catch(e) {}
}

// ── Constants ─────────────────────────────────────────────
const influenceValue=0.4;
const N=24, K_RESTORE=0.15, K_NEIGHBOR=0.07, DAMPING=0.74, MAX_DEFORM=1.7;

// ── Helpers ───────────────────────────────────────────────
function lerpColor(c1,c2,t) {
  t=Math.max(0,Math.min(1,t));
  const p=(c,s)=>parseInt(c.slice(s,s+2),16);
  const mix=(a,b)=>Math.round(a+(b-a)*t).toString(16).padStart(2,'0');
  return `#${mix(p(c1,1),p(c2,1))}${mix(p(c1,3),p(c2,3))}${mix(p(c1,5),p(c2,5))}`;
}
function smoothPath(ctx,pts) {
  const n=pts.length;
  ctx.moveTo((pts[n-1].x+pts[0].x)/2,(pts[n-1].y+pts[0].y)/2);
  for (let i=0;i<n;i++) {
    const c=pts[i], nx=pts[(i+1)%n];
    ctx.quadraticCurveTo(c.x,c.y,(c.x+nx.x)/2,(c.y+nx.y)/2);
  }
  ctx.closePath();
}

// ── Rain ──────────────────────────────────────────────────
let rainTimer=0, rainDrops=[];
function initRain() {
  rainDrops=Array.from({length:70},()=>({
    x:Math.random()*W, y:Math.random()*H*0.6,
    speed:2+Math.random()*2, len:10+Math.random()*8,
  }));
}
const CLOUDS=[{rx:0.25,ry:0.07,rs:0.07},{rx:0.65,ry:0.04,rs:0.085},{rx:0.83,ry:0.11,rs:0.055}];
function cloudHit(mx,my) {
  return CLOUDS.some(c=>Math.hypot(mx-c.rx*W,my-c.ry*H)<c.rs*Math.min(W,H)*1.7);
}
const NIGHT_STARS=[[0.1,0.08],[0.25,0.04],[0.4,0.12],[0.55,0.05],[0.7,0.1],
                   [0.85,0.06],[0.15,0.22],[0.6,0.2],[0.9,0.18],[0.35,0.3],
                   [0.75,0.28],[0.05,0.33],[0.48,0.08],[0.92,0.3],[0.62,0.35]];
const LIGHTNING={rx:0.55,ry:0.18};

// ── SCENES ────────────────────────────────────────────────
// Add new scenes here. Each scene: id, label, sky[], ground[], groundY,
// shadowColor, cloudFill (null=no clouds), cloudShadow, items[]
//
// items: scene-specific item tray (to be defined per-scene later).
// Until then, all scenes share DEFAULT_ITEMS — the original item set.
const DEFAULT_ITEMS = [
  {type:'cupcake',  rx:0.18, ry:0.78},
  {type:'cocktail', rx:0.82, ry:0.78},
  {type:'flower',   rx:0.5,  ry:0.84},
];

const SCENES = [
  {
    id:'spring', label:'봄 들판',
    sky:['#87CEEB','#C5E8F5'], ground:['#88C34A','#4E8A20'], groundY:0.6,
    shadowColor:'rgba(42,80,0,0.22)',
    cloudFill:'rgba(255,255,255,0.92)', cloudShadow:'rgba(100,140,200,0.2)',
    items: DEFAULT_ITEMS, // TODO: define spring-specific items
  },
  {
    id:'sunset', label:'노을',
    sky:['#5C1E58','#C43650','#EF6428','#FFB040','#FFE068'], ground:['#B8724A','#7A3C18'], groundY:0.62,
    shadowColor:'rgba(90,30,0,0.28)',
    cloudFill:'rgba(255,155,100,0.78)', cloudShadow:'rgba(120,35,75,0.38)',
    items: [{type:'odeng',rx:0.18,ry:0.78},{type:'icecream',rx:0.5,ry:0.82},{type:'soju',rx:0.82,ry:0.78}],
  },
  {
    id:'night', label:'밤',
    sky:['#0D1B3E','#152850'], ground:['#1A3A1A','#0D2010'], groundY:0.6,
    shadowColor:'rgba(0,20,0,0.35)',
    cloudFill:null,
    items: [{type:'chicken',rx:0.18,ry:0.78},{type:'tteokbokki',rx:0.5,ry:0.82},{type:'ramen',rx:0.82,ry:0.78}],
  },
  {
    id:'rainy', label:'비오는 날',
    sky:['#6A8A9A','#8AAABB'], ground:['#527830','#325018'], groundY:0.6,
    shadowColor:'rgba(20,50,0,0.22)',
    cloudFill:'rgba(160,175,185,0.95)', cloudShadow:'rgba(60,90,120,0.25)',
    items: [{type:'cocoa',rx:0.18,ry:0.78},{type:'pajeon',rx:0.5,ry:0.82},{type:'samgyeopsal',rx:0.82,ry:0.78}],
  },
  {
    id:'cozy', label:'아늑한 방',
    sky:['#F5E0C8','#EDDCC0'], ground:['#C8906A','#A07040'], groundY:0.6,
    shadowColor:'rgba(80,40,0,0.2)',
    cloudFill:null,
    items: [{type:'cocoa',rx:0.18,ry:0.78},{type:'macaron',rx:0.5,ry:0.84},{type:'teacup',rx:0.82,ry:0.78}],
  },
  {
    id:'study', label:'공부 책상',
    sky:['#EDE4D8','#D8CDB8'], ground:['#C8A870','#9A7840'], groundY:0.6,
    shadowColor:'rgba(70,40,0,0.2)',
    cloudFill:null,
    items: [{type:'coffee',rx:0.18,ry:0.78},{type:'cookie',rx:0.5,ry:0.84},{type:'macaron',rx:0.82,ry:0.78}],
  },
];

// ── Scene state ───────────────────────────────────────────
let sceneIdx=0;
let sceneOffsetPx=0, sceneOffsetTarget=0; // horizontal slide animation
let swipeStartX=null, swipeLiveX=0;       // live swipe tracking
let starEyeTimer=0, starPulse=0, lightningFlash=0;

// ── Panel scroll ──────────────────────────────────────────
let panelScroll=0, panelMaxScroll=0;
let panelDragging=false, panelDragStartY=0, panelScrollStart=0;
function updatePanelMaxScroll() {
  const ph=H*0.44;
  const lastY=H*0.09+(accessories.length-1)*H*0.10+H*0.09;
  panelMaxScroll=Math.max(0,lastY-H*0.04-ph);
  panelScroll=Math.min(panelScroll,panelMaxScroll);
}

// ── Pig ───────────────────────────────────────────────────
class Pig {
  resetAt(x) {
    this.r=Math.min(W,H)*0.16;
    this.cx=x; this.cy=H*0.25;
    this.vcx=0; this.vcy=0;
    this.neighborRest=(2*Math.PI*this.r)/N;
    this.pts=Array.from({length:N},(_,i)=>{
      const a=(i/N)*Math.PI*2-Math.PI/2;
      const ox=Math.cos(a)*this.r, oy=Math.sin(a)*this.r;
      return {x:this.cx+ox,y:this.cy+oy,vx:0,vy:0,ox,oy};
    });
    this.dragIdx=-1; this.active=false;
    this.petLevel=0; this.eatTimer=0;
    this.drunkTimer=0; this.sniffTimer=0;
    this.fatTimer=0; this.cupcakeEatTimes=[];
    this.earPts=[
      {x:this.cx-this.r*0.52,y:this.cy-this.r*0.78,vx:0,vy:0},
      {x:this.cx+this.r*0.52,y:this.cy-this.r*0.78,vx:0,vy:0},
    ];
    this.earDragIdx=-1; this.earPullTimer=0;
    this.faceOffX=0; this.faceOffY=0; this.faceVX=0; this.faceVY=0;
  }
  constructor(x) { this.resetAt(x); }

  stress() {
    return this.pts.reduce((sum,p)=>sum+Math.hypot(p.x-(this.cx+p.ox),p.y-(this.cy+p.oy)),0)/(N*this.r);
  }

  updateCenter() {
    const groundY=H*0.6;
    this.vcy+=0.5;
    const prevCx=this.cx, prevCy=this.cy;
    this.cx+=this.vcx; this.cy+=this.vcy;
    if (this.cy+this.r>=groundY) {
      this.cy=groundY-this.r;
      if (Math.abs(this.vcy)<1.5) { this.vcy=0; }
      else {
        this.vcy*=-0.55;
        for (let i=0;i<N;i++) {
          const p=this.pts[i];
          const sf=Math.abs(p.ox)/this.r;
          p.vx+=(p.ox>0?1:-1)*sf*Math.abs(this.vcy)*0.3;
          p.vy-=Math.abs(this.vcy)*0.15;
        }
      }
      this.vcx*=0.8;
    }
    const dcx=this.cx-prevCx, dcy=this.cy-prevCy;
    for (const p of this.pts) { p.x+=dcx; p.y+=dcy; }
  }

  update() {
    this.petLevel=Math.max(0,this.petLevel-0.012);
    if (this.fatTimer>0) this.fatTimer--;
    if (this.earPullTimer>0) this.earPullTimer--;
    if (stretchSndTimer>0) stretchSndTimer--;
    this.updateCenter();
    for (let i=0;i<N;i++) {
      const p=this.pts[i];
      if (this.active&&i===this.dragIdx) continue;
      const prev=this.pts[(i-1+N)%N], next=this.pts[(i+1)%N];
      let fx=(this.cx+p.ox-p.x)*K_RESTORE;
      let fy=(this.cy+p.oy-p.y)*K_RESTORE;
      for (const nb of [prev,next]) {
        const dx=nb.x-p.x,dy=nb.y-p.y,d=Math.hypot(dx,dy)||0.001;
        const f=(d-this.neighborRest)*K_NEIGHBOR;
        fx+=(dx/d)*f; fy+=(dy/d)*f;
      }
      p.vx=(p.vx+fx)*DAMPING; p.vy=(p.vy+fy)*DAMPING;
      p.x+=p.vx; p.y+=p.vy;
    }
    for (let i=0;i<2;i++) {
      if (this.earDragIdx===i) continue;
      const ep=this.earPts[i];
      const sign=i===0?-1:1;
      const tx=this.cx+sign*this.r*0.52, ty=this.cy-this.r*0.78;
      ep.vx=(ep.vx+(tx-ep.x)*0.22)*0.68;
      ep.vy=(ep.vy+(ty-ep.y)*0.22)*0.68;
      ep.x+=ep.vx; ep.y+=ep.vy;
    }
    // face jelly: springs toward drag displacement, snaps back on release
    if (this.active&&this.dragIdx>=0) {
      const p=this.pts[this.dragIdx];
      const tx=(p.x-(this.cx+p.ox))*0.22;
      const ty=(p.y-(this.cy+p.oy))*0.22;
      this.faceVX=(this.faceVX+(tx-this.faceOffX)*0.18)*0.72;
      this.faceVY=(this.faceVY+(ty-this.faceOffY)*0.18)*0.72;
    } else {
      this.faceVX=(this.faceVX-this.faceOffX*0.24)*0.68;
      this.faceVY=(this.faceVY-this.faceOffY*0.24)*0.68;
    }
    this.faceOffX+=this.faceVX;
    this.faceOffY+=this.faceVY;
  }

  pointerDown(x,y) {
    if (Math.hypot(x-this.cx,y-this.cy)>this.r*1.5) return false;
    let best=Infinity;
    this.pts.forEach((p,i)=>{const d=Math.hypot(x-p.x,y-p.y);if(d<best){best=d;this.dragIdx=i;}});
    this.active=true; this.downX=x; this.downY=y;
    return true;
  }

  jiggle() {
    this.vcy=-this.r*0.13;
    for (const p of this.pts) {
      const ax=p.ox/(Math.hypot(p.ox,p.oy)||1), ay=p.oy/(Math.hypot(p.ox,p.oy)||1);
      const pw=this.r*0.18;
      p.vx+=ax*pw+(Math.random()-0.5)*pw*0.6;
      p.vy+=ay*pw+(Math.random()-0.5)*pw*0.6;
    }
  }

  eat(type) {
    if (type==='cocktail'||type==='soju') this.drunkTimer=60;
    if (type==='cupcake') {
      const now=Date.now();
      this.cupcakeEatTimes=this.cupcakeEatTimes.filter(t=>now-t<5000);
      this.cupcakeEatTimes.push(now);
      if (this.cupcakeEatTimes.length>=3) { this.fatTimer=120; this.cupcakeEatTimes=[]; }
    }
    this.eatTimer=100; this.jiggle();
  }

  sniff() { this.sniffTimer=120; }

  earHitTest(mx,my) {
    for (let i=0;i<2;i++) {
      const sign=i===0?-1:1;
      const ax=this.cx+sign*this.r*0.52, ay=this.cy-this.r*0.78;
      if (Math.hypot(mx-ax,my-ay)<this.r*0.38) return i;
    }
    return -1;
  }
  startEarDrag(i) { this.earDragIdx=i; this.earPullTimer=60; }
  moveEarDrag(i,mx,my) {
    const ep=this.earPts[i]; ep.x=mx; ep.y=my; ep.vx=0; ep.vy=0;
    this.earPullTimer=60;
  }
  endEarDrag() { this.earDragIdx=-1; }

  pointerMove(x,y) {
    if (!this.active) return;
    const p=this.pts[this.dragIdx];
    const rx=this.cx+p.ox, ry=this.cy+p.oy;
    const dx=x-rx, dy=y-ry, d=Math.hypot(dx,dy);
    const maxD=this.r*MAX_DEFORM;
    if (d>maxD) { x=rx+dx/d*maxD; y=ry+dy/d*maxD; }
    p.x=x; p.y=y; p.vx=0; p.vy=0;
    playStretch();
    const maxSpread=Math.round(1+influenceValue*7);
    const falloff=0.55-influenceValue*0.2;
    for (let spread=1;spread<=maxSpread;spread++) {
      const fac=Math.pow(falloff,spread)*(0.1+influenceValue*0.25);
      for (const sign of [1,-1]) {
        const ni=(this.dragIdx+sign*spread+N)%N;
        this.pts[ni].vx+=(x-this.pts[ni].x)*fac;
        this.pts[ni].vy+=(y-this.pts[ni].y)*fac;
      }
    }
  }

  pointerUp(x,y) {
    if (this.active&&x!==undefined) {
      if (Math.hypot(x-this.downX,y-this.downY)<10) this.jiggle();
    }
    this.active=false; this.dragIdx=-1;
  }

  draw(ctx) {
    const s=this.stress();
    const bodyColor=lerpColor('#FFB3C6','#FF5577',Math.min(s/0.5,1));
    const strokeColor=lerpColor('#E896A8','#CC3355',Math.min(s/0.5,1));
    const fatScale=this.fatTimer>0?1+0.38*Math.sin(Math.PI*(1-this.fatTimer/120)):1;
    if (fatScale!==1) {
      ctx.save();
      ctx.translate(this.cx,this.cy); ctx.scale(fatScale,fatScale); ctx.translate(-this.cx,-this.cy);
    }
    this._drawEar(ctx,this.cx-this.r*0.52,this.cy-this.r*0.78,this.earPts[0].x,this.earPts[0].y);
    this._drawEar(ctx,this.cx+this.r*0.52,this.cy-this.r*0.78,this.earPts[1].x,this.earPts[1].y);
    ctx.save();
    ctx.shadowColor='rgba(80,0,30,0.18)'; ctx.shadowBlur=20; ctx.shadowOffsetY=10;
    ctx.beginPath(); smoothPath(ctx,this.pts); ctx.fillStyle=bodyColor; ctx.fill();
    ctx.restore();
    ctx.beginPath(); smoothPath(ctx,this.pts);
    ctx.strokeStyle=strokeColor; ctx.lineWidth=3; ctx.stroke();
    this._drawFace(ctx,s);
    if (fatScale!==1) ctx.restore();
  }

  _drawEar(ctx,ax,ay,tx,ty) {
    const baseR=this.r*0.22;
    const dx=tx-ax, dy=ty-ay, dist=Math.hypot(dx,dy);
    if (dist<baseR*0.25) {
      ctx.beginPath(); ctx.arc(ax,ay,baseR,0,Math.PI*2); ctx.fillStyle='#FFAAC4'; ctx.fill();
      ctx.strokeStyle='#E896A8'; ctx.lineWidth=2.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(ax,ay,baseR*0.5,0,Math.PI*2); ctx.fillStyle='#FF8FAE'; ctx.fill();
      return;
    }
    const angle=Math.atan2(dy,dx), perp=angle+Math.PI/2;
    const cosP=Math.cos(perp), sinP=Math.sin(perp);
    const tipR=Math.max(baseR*0.28,baseR*(1-dist/(this.r*1.2)));
    ctx.beginPath();
    ctx.moveTo(ax+cosP*baseR,ay+sinP*baseR);
    ctx.lineTo(tx+cosP*tipR,ty+sinP*tipR);
    ctx.arc(tx,ty,tipR,perp,perp+Math.PI);
    ctx.lineTo(ax-cosP*baseR,ay-sinP*baseR);
    ctx.arc(ax,ay,baseR,perp+Math.PI,perp+Math.PI*2);
    ctx.closePath();
    ctx.fillStyle='#FFAAC4'; ctx.fill();
    ctx.strokeStyle='#E896A8'; ctx.lineWidth=2.5; ctx.stroke();
    const midX=ax+dx*0.6, midY=ay+dy*0.6;
    ctx.beginPath(); ctx.arc(midX,midY,Math.min(tipR*0.85,baseR*0.5),0,Math.PI*2);
    ctx.fillStyle='#FF8FAE'; ctx.fill();
  }

  _drawFace(ctx,s) {
    ctx.save();
    ctx.translate(this.faceOffX, this.faceOffY);
    // squash-stretch: scale along drag direction
    const fd=Math.hypot(this.faceOffX,this.faceOffY);
    if (fd>0.5) {
      const nx=this.faceOffX/fd, ny=this.faceOffY/fd;
      const str=Math.min(fd/(this.r*0.6),1);
      const sx=1+str*0.28, sy=1-str*0.18;
      ctx.translate(this.cx, this.cy);
      ctx.transform(1+(sx-1)*nx*nx, (sx-1)*nx*ny, (sx-1)*nx*ny, 1+(sx-1)*ny*ny, 0, 0);
      ctx.scale(1,sy+(sx-1)*Math.abs(ny));
      ctx.translate(-this.cx, -this.cy);
    }
    const {cx,cy,r}=this;
    ctx.save();
    ctx.globalAlpha=0.28+this.petLevel*0.38; ctx.fillStyle='#FF4477';
    ctx.beginPath(); ctx.ellipse(cx-r*0.5,cy+r*0.06,r*0.13,r*0.09,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+r*0.5,cy+r*0.06,r*0.13,r*0.09,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.beginPath(); ctx.ellipse(cx,cy+r*0.2,r*0.33,r*0.23,0,0,Math.PI*2);
    ctx.fillStyle='#FFB3C6'; ctx.fill(); ctx.strokeStyle='#E896A8'; ctx.lineWidth=2; ctx.stroke();
    if (this.sniffTimer>0) this.sniffTimer--;
    const ss=this.sniffTimer>0?1+0.7*Math.abs(Math.sin(this.sniffTimer*0.25)):1;
    ctx.fillStyle='#BB5570';
    for (const nx of [cx-r*0.12,cx+r*0.12]) {
      const ny=cy+r*0.2, hw=r*0.038*ss, hh=r*0.1*ss;
      ctx.beginPath();
      ctx.moveTo(nx,ny+hh*0.6);
      ctx.bezierCurveTo(nx-hw*2,ny+hh*0.1,nx-hw*2,ny-hh*0.9,nx,ny-hh*0.35);
      ctx.bezierCurveTo(nx+hw*2,ny-hh*0.9,nx+hw*2,ny+hh*0.1,nx,ny+hh*0.6);
      ctx.fill();
    }
    this._drawEyes(ctx,s);
    this._drawMouth(ctx,s);
    ctx.restore(); // end face translate
  }

  _drawEyes(ctx,s) {
    const {cx,cy,r}=this;
    const ey=cy-r*0.1, ex=r*0.27, er=r*0.1;
    ctx.save();
    ctx.lineWidth=Math.max(2.5,r*0.038); ctx.lineCap='round';
    if (this.eatTimer>0) { this.eatTimer--; s=0; }
    if (this.earDragIdx>=0||this.earPullTimer>0) {
      ctx.strokeStyle='#442233';
      for (const sign of [-1,1]) {
        const ex2=cx+sign*ex;
        ctx.beginPath();
        ctx.moveTo(ex2-er,ey-er*0.5); ctx.lineTo(ex2+er,ey+er*0.5);
        ctx.moveTo(ex2+er,ey-er*0.5); ctx.lineTo(ex2-er,ey+er*0.5);
        ctx.stroke();
      }
    } else if (starEyeTimer>0) {
      starEyeTimer--;
      ctx.fillStyle='#FFCC00';
      for (const sign of [-1,1]) { _starShape(cx+sign*ex,ey,er*1.1); }
    } else if (rainTimer>0) {
      ctx.strokeStyle='#3366AA';
      for (const sign of [-1,1]) {
        ctx.beginPath(); ctx.arc(cx+sign*ex,ey-er*0.3,er,0.25,Math.PI-0.25,false); ctx.stroke();
      }
    } else if (this.drunkTimer>0) {
      this.drunkTimer--;
      ctx.strokeStyle='#442233';
      for (const sign of [-1,1]) {
        const ex2=cx+sign*ex;
        ctx.beginPath();
        ctx.moveTo(ex2-er,ey);
        ctx.bezierCurveTo(ex2-er*0.3,ey-er*0.9,ex2+er*0.3,ey+er*0.9,ex2+er,ey);
        ctx.stroke();
      }
    } else if (this.petLevel>0.3) {
      ctx.strokeStyle='#442233';
      for (const sign of [-1,1]) {
        const ex2=cx+sign*ex;
        ctx.beginPath(); ctx.arc(ex2,ey-er*0.5,er,0.25,Math.PI-0.25,false); ctx.stroke();
        for (const pos of [-1,0,1]) {
          const ang=Math.PI*0.5+pos*0.55;
          const bx=ex2+Math.cos(ang)*er, by=ey-er*0.5+Math.sin(ang)*er;
          ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+Math.cos(ang)*er*0.5,by+Math.sin(ang)*er*0.5); ctx.stroke();
        }
      }
    } else if (s<0.08) {
      ctx.strokeStyle='#442233';
      for (const sign of [-1,1]) {
        ctx.beginPath(); ctx.arc(cx+sign*ex,ey+er*0.5,er,Math.PI+0.25,-0.25,false); ctx.stroke();
      }
    } else if (s<0.35) {
      for (const sign of [-1,1]) {
        ctx.fillStyle='#442233'; ctx.beginPath(); ctx.arc(cx+sign*ex,ey,er,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(cx+sign*ex+er*0.3,ey-er*0.3,er*0.35,0,Math.PI*2); ctx.fill();
      }
    } else {
      ctx.strokeStyle='#442233';
      for (const sign of [-1,1]) {
        ctx.beginPath();
        ctx.moveTo(cx+sign*ex-er,ey-er*0.5); ctx.lineTo(cx+sign*ex+er,ey+er*0.5);
        ctx.moveTo(cx+sign*ex+er,ey-er*0.5); ctx.lineTo(cx+sign*ex-er,ey+er*0.5);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  _drawMouth(ctx,s) {
    const {cx,cy,r}=this;
    const my=cy+r*0.44;
    ctx.save();
    ctx.lineWidth=Math.max(2,r*0.03); ctx.lineCap='round';
    if (rainTimer>0) {
      ctx.strokeStyle='#3366AA';
      ctx.beginPath(); ctx.arc(cx,my-r*0.04,r*0.1,0.15,Math.PI-0.15,true); ctx.stroke();
    } else if (this.eatTimer>0) {
      ctx.fillStyle='#882244';
      ctx.beginPath(); ctx.ellipse(cx,my,r*0.22,r*0.13,0,0,Math.PI*2); ctx.fill();
    } else if (s<0.08) {
      ctx.strokeStyle='#BB5570';
      ctx.beginPath(); ctx.arc(cx,my-r*0.02,r*0.1,0.15,Math.PI-0.15); ctx.stroke();
    } else if (s<0.35) {
      ctx.fillStyle='#BB5570';
      ctx.beginPath(); ctx.arc(cx,my,r*0.065,0,Math.PI*2); ctx.fill();
    } else {
      ctx.strokeStyle='#BB5570';
      ctx.beginPath();
      ctx.moveTo(cx-r*0.1,my);
      ctx.quadraticCurveTo(cx-r*0.03,my+r*0.06,cx,my-r*0.01);
      ctx.quadraticCurveTo(cx+r*0.03,my-r*0.07,cx+r*0.1,my+r*0.01);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ── Food ──────────────────────────────────────────────────
class Food {
  constructor(type,rx,ry) {
    this.type=type; this.rx=rx; this.ry=ry;
    this.x=rx; this.y=ry; this.dragging=false; this.eaten=false; this.respawn=0;
  }
  get size() { return Math.min(W,H)*0.21; }
  hitTest(mx,my) { return !this.eaten&&Math.hypot(mx-this.x,my-this.y)<this.size*0.85; }
  update() {
    if (this.eaten) { this.respawn--; if(this.respawn<=0){this.eaten=false;this.x=this.rx;this.y=this.ry;} }
  }
  startDrag() { this.dragging=true; }
  moveTo(x,y) { if(this.dragging){this.x=x;this.y=y;} }
  endDrag() { this.dragging=false; if(!this.eaten){this.x=this.rx;this.y=this.ry;} }
  markEaten() { this.eaten=true; this.dragging=false; this.respawn=45; }

  draw(ctx) {
    if (this.eaten) return;
    const {x,y}=this; const s=this.size;
    const m={
      cupcake: ()=>this._drawCupcake(ctx,x,y,s),
      cocktail:()=>this._drawCocktail(ctx,x,y,s),
      flower:  ()=>this._drawFlower(ctx,x,y,s),
      clover:  ()=>this._drawClover(ctx,x,y,s),
      juice:   ()=>this._drawJuice(ctx,x,y,s),
      hotmilk: ()=>this._drawHotmilk(ctx,x,y,s),
      cookie:  ()=>this._drawCookie(ctx,x,y,s),
      teacup:  ()=>this._drawTeacup(ctx,x,y,s),
      cocoa:   ()=>this._drawCocoa(ctx,x,y,s),
      lollipop:()=>this._drawLollipop(ctx,x,y,s),
      macaron: ()=>this._drawMacaron(ctx,x,y,s),
      camera:   ()=>this._drawCamera(ctx,x,y,s),
      bulgogi:  ()=>this._drawBulgogi(ctx,x,y,s),
      soju:     ()=>this._drawSoju(ctx,x,y,s),
      coffee:   ()=>this._drawCoffee(ctx,x,y,s),
      odeng:      ()=>this._drawOdeng(ctx,x,y,s),
      icecream:   ()=>this._drawIcecream(ctx,x,y,s),
      chicken:    ()=>this._drawChicken(ctx,x,y,s),
      tteokbokki: ()=>this._drawTteokbokki(ctx,x,y,s),
      ramen:      ()=>this._drawRamen(ctx,x,y,s),
      pajeon:     ()=>this._drawPajeon(ctx,x,y,s),
      samgyeopsal:()=>this._drawSamgyeopsal(ctx,x,y,s),
    };
    (m[this.type]||m.flower)();
  }

  _drawCupcake(ctx,x,y,s) {
    ctx.beginPath(); ctx.moveTo(x-s*0.38,y-s*0.05); ctx.lineTo(x-s*0.28,y+s*0.45);
    ctx.lineTo(x+s*0.28,y+s*0.45); ctx.lineTo(x+s*0.38,y-s*0.05); ctx.closePath();
    ctx.fillStyle='#C4854A'; ctx.fill();
    ctx.strokeStyle='#A8683A'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x-s*0.1,y-s*0.05); ctx.lineTo(x-s*0.05,y+s*0.45);
    ctx.moveTo(x+s*0.1,y-s*0.05); ctx.lineTo(x+s*0.05,y+s*0.45); ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y-s*0.18,s*0.4,0,Math.PI*2); ctx.fillStyle='#FFDDEE'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y-s*0.38,s*0.26,0,Math.PI*2); ctx.fillStyle='#FFB3CC'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y-s*0.62,s*0.12,0,Math.PI*2); ctx.fillStyle='#EE2244'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(x,y-s*0.5); ctx.quadraticCurveTo(x+s*0.12,y-s*0.6,x+s*0.08,y-s*0.7);
    ctx.strokeStyle='#55AA55'; ctx.lineWidth=2; ctx.stroke();
  }

  _drawCocktail(ctx,x,y,s) {
    ctx.beginPath(); ctx.moveTo(x,y+s*0.12); ctx.lineTo(x,y+s*0.44); ctx.strokeStyle='#BBBBCC'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-s*0.22,y+s*0.44); ctx.lineTo(x+s*0.22,y+s*0.44); ctx.stroke();
    ctx.save();
    ctx.beginPath(); ctx.moveTo(x,y+s*0.12); ctx.lineTo(x-s*0.264,y-s*0.18); ctx.lineTo(x+s*0.264,y-s*0.18); ctx.closePath();
    const g=ctx.createLinearGradient(x,y-s*0.18,x,y+s*0.12);
    g.addColorStop(0,'#FF88BB'); g.addColorStop(1,'#FFCC66');
    ctx.fillStyle=g; ctx.globalAlpha=0.85; ctx.fill(); ctx.restore();
    ctx.beginPath(); ctx.moveTo(x-s*0.44,y-s*0.38); ctx.lineTo(x,y+s*0.12); ctx.lineTo(x+s*0.44,y-s*0.38);
    ctx.strokeStyle='#DDEEFF'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-s*0.44,y-s*0.38); ctx.lineTo(x+s*0.44,y-s*0.38); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+s*0.08,y-s*0.38); ctx.lineTo(x+s*0.28,y-s*0.72); ctx.strokeStyle='#AA8844'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(x+s*0.28,y-s*0.72,s*0.16,Math.PI,0); ctx.fillStyle='#FF3388'; ctx.fill(); ctx.strokeStyle='#CC1166'; ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+s*0.28,y-s*0.72); ctx.lineTo(x+s*0.14,y-s*0.72); ctx.moveTo(x+s*0.28,y-s*0.72); ctx.lineTo(x+s*0.42,y-s*0.72); ctx.stroke();
    ctx.beginPath(); ctx.arc(x-s*0.12,y-s*0.38,s*0.07,0,Math.PI*2); ctx.fillStyle='#EE2244'; ctx.fill();
  }

  _drawFlower(ctx,x,y,s) {
    ctx.beginPath(); ctx.moveTo(x,y+s*0.1); ctx.lineTo(x,y+s*0.44); ctx.strokeStyle='#44AA44'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.save(); ctx.beginPath(); ctx.ellipse(x+s*0.13,y+s*0.3,s*0.13,s*0.07,-Math.PI/4,0,Math.PI*2); ctx.fillStyle='#55BB55'; ctx.fill(); ctx.restore();
    for (let i=0;i<6;i++) {
      const ang=(i/6)*Math.PI*2, px=x+Math.cos(ang)*s*0.2, py=y+Math.sin(ang)*s*0.2;
      ctx.save(); ctx.beginPath(); ctx.ellipse(px,py,s*0.13,s*0.09,ang,0,Math.PI*2);
      ctx.fillStyle=i%2===0?'#FF88BB':'#FFBBDD'; ctx.fill(); ctx.restore();
    }
    ctx.beginPath(); ctx.arc(x,y,s*0.11,0,Math.PI*2); ctx.fillStyle='#FFDD44'; ctx.fill(); ctx.strokeStyle='#DDAA00'; ctx.lineWidth=1.5; ctx.stroke();
  }

  _drawClover(ctx,x,y,s) {
    ctx.beginPath(); ctx.moveTo(x,y+s*0.1); ctx.lineTo(x,y+s*0.44);
    ctx.strokeStyle='#33AA33'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y+s*0.08,s*0.05,0,Math.PI*2);
    ctx.fillStyle='#33BB33'; ctx.fill();
    const lp=[[x,y-s*0.1],[x-s*0.18,y+s*0.08],[x+s*0.18,y+s*0.08]];
    for (const [lx,ly] of lp) {
      ctx.save(); ctx.translate(lx,ly);
      ctx.beginPath(); ctx.ellipse(0,0,s*0.15,s*0.19,0,0,Math.PI*2);
      ctx.fillStyle='#44CC44'; ctx.fill(); ctx.strokeStyle='#22AA22'; ctx.lineWidth=1; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,s*0.17); ctx.lineTo(0,-s*0.15);
      ctx.strokeStyle='rgba(34,140,34,0.35)'; ctx.lineWidth=1; ctx.stroke();
      ctx.restore();
    }
  }

  _drawJuice(ctx,x,y,s) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x-s*0.22,y-s*0.25); ctx.lineTo(x+s*0.22,y-s*0.25);
    ctx.lineTo(x+s*0.17,y+s*0.44); ctx.lineTo(x-s*0.17,y+s*0.44); ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();
    ctx.strokeStyle='#AACCFF'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x-s*0.22,y-s*0.25); ctx.lineTo(x+s*0.22,y-s*0.25);
    ctx.lineTo(x+s*0.17,y+s*0.44); ctx.lineTo(x-s*0.17,y+s*0.44); ctx.closePath(); ctx.clip();
    ctx.fillStyle='#FF9922'; ctx.fillRect(x-s*0.25,y-s*0.07,s*0.5,s*0.55);
    ctx.fillStyle='rgba(255,255,180,0.45)';
    for (const [bx,by,br] of [[x-s*0.06,y+s*0.12,s*0.022],[x+s*0.09,y+s*0.28,s*0.018],[x-s*0.04,y+s*0.38,s*0.025]]) {
      ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    ctx.beginPath(); ctx.moveTo(x+s*0.09,y-s*0.25); ctx.lineTo(x+s*0.16,y-s*0.62);
    ctx.strokeStyle='#FF4488'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(x-s*0.14,y-s*0.25,s*0.1,Math.PI,0);
    ctx.fillStyle='#FF8800'; ctx.fill(); ctx.strokeStyle='#FF6600'; ctx.lineWidth=1; ctx.stroke();
  }

  _drawHotmilk(ctx,x,y,s) {
    ctx.beginPath(); ctx.roundRect(x-s*0.22,y-s*0.06,s*0.44,s*0.5,s*0.06);
    ctx.fillStyle='#FFF8F0'; ctx.fill(); ctx.strokeStyle='#DDD0C0'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(x+s*0.31,y+s*0.12,s*0.15,-Math.PI*0.45,Math.PI*0.45);
    ctx.strokeStyle='#DDD0C0'; ctx.lineWidth=3.5; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x,y-s*0.06,s*0.2,s*0.06,0,0,Math.PI*2);
    ctx.fillStyle='#FFFDF8'; ctx.fill();
    ctx.lineCap='round';
    for (const [dx,sign] of [[-s*0.1,-1],[0,1],[s*0.1,-1]]) {
      ctx.beginPath();
      ctx.moveTo(x+dx,y-s*0.12);
      ctx.bezierCurveTo(x+dx+sign*s*0.07,y-s*0.28,x+dx-sign*s*0.07,y-s*0.4,x+dx,y-s*0.52);
      ctx.strokeStyle='rgba(180,180,200,0.38)'; ctx.lineWidth=2; ctx.stroke();
    }
  }

  _drawCookie(ctx,x,y,s) {
    ctx.save(); ctx.translate(x,y);
    ctx.beginPath();
    for (let i=0;i<5;i++) {
      const oa=(i/5)*Math.PI*2-Math.PI/2, ia=oa+Math.PI/5;
      i===0?ctx.moveTo(Math.cos(oa)*s*0.3,Math.sin(oa)*s*0.3):ctx.lineTo(Math.cos(oa)*s*0.3,Math.sin(oa)*s*0.3);
      ctx.lineTo(Math.cos(ia)*s*0.13,Math.sin(ia)*s*0.13);
    }
    ctx.closePath(); ctx.fillStyle='#D4A464'; ctx.fill(); ctx.strokeStyle='#A07830'; ctx.lineWidth=1.5; ctx.stroke();
    for (const [dx,dy,c] of [[-s*0.08,-s*0.08,'#FF6688'],[s*0.1,s*0.05,'#44AAFF'],[0,s*0.12,'#FFDD33'],[-s*0.04,s*0.03,'#88DD44']]) {
      ctx.beginPath(); ctx.arc(dx,dy,s*0.03,0,Math.PI*2); ctx.fillStyle=c; ctx.fill();
    }
    ctx.restore();
  }

  _drawTeacup(ctx,x,y,s) {
    ctx.beginPath(); ctx.ellipse(x,y+s*0.38,s*0.32,s*0.08,0,0,Math.PI*2);
    ctx.fillStyle='#FFF0E0'; ctx.fill(); ctx.strokeStyle='#DDCCAA'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x-s*0.22,y-s*0.06);
    ctx.quadraticCurveTo(x-s*0.23,y+s*0.35,x-s*0.14,y+s*0.36);
    ctx.lineTo(x+s*0.14,y+s*0.36);
    ctx.quadraticCurveTo(x+s*0.23,y+s*0.35,x+s*0.22,y-s*0.06);
    ctx.closePath();
    ctx.fillStyle='#FFF0E0'; ctx.fill(); ctx.strokeStyle='#DDCCAA'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x,y-s*0.06,s*0.2,s*0.05,0,0,Math.PI*2);
    ctx.fillStyle='#C07040'; ctx.fill();
    ctx.beginPath(); ctx.arc(x+s*0.28,y+s*0.14,s*0.14,-Math.PI*0.45,Math.PI*0.45);
    ctx.strokeStyle='#DDCCAA'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.lineCap='round';
    for (const [dx,sign] of [[-s*0.06,-1],[s*0.06,1]]) {
      ctx.beginPath();
      ctx.moveTo(x+dx,y-s*0.1);
      ctx.bezierCurveTo(x+dx+sign*s*0.06,y-s*0.26,x+dx-sign*s*0.06,y-s*0.36,x+dx,y-s*0.46);
      ctx.strokeStyle='rgba(180,130,80,0.32)'; ctx.lineWidth=1.5; ctx.stroke();
    }
  }

  _drawCocoa(ctx,x,y,s) {
    // cup body
    const cupG=ctx.createLinearGradient(x-s*0.23,0,x+s*0.23,0);
    cupG.addColorStop(0,'#6A3A24'); cupG.addColorStop(0.45,'#8C5438'); cupG.addColorStop(1,'#5A2E18');
    ctx.beginPath(); ctx.roundRect(x-s*0.23,y-s*0.06,s*0.46,s*0.5,s*0.07);
    ctx.fillStyle=cupG; ctx.fill(); ctx.strokeStyle='#3E1E0A'; ctx.lineWidth=2; ctx.stroke();
    // handle
    ctx.beginPath(); ctx.arc(x+s*0.32,y+s*0.12,s*0.16,-Math.PI*0.45,Math.PI*0.45);
    ctx.strokeStyle='#5A2E18'; ctx.lineWidth=3.5; ctx.stroke();
    // inner liquid (dark cocoa)
    ctx.beginPath(); ctx.ellipse(x,y-s*0.055,s*0.19,s*0.06,0,0,Math.PI*2);
    ctx.fillStyle='#3E1E0A'; ctx.fill();
    // liquid surface (warm brown)
    ctx.beginPath(); ctx.ellipse(x,y-s*0.07,s*0.18,s*0.055,0,0,Math.PI*2);
    ctx.fillStyle='#6B3318'; ctx.fill();
    // cup rim inner shadow
    ctx.beginPath(); ctx.ellipse(x,y-s*0.06,s*0.21,s*0.07,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(30,10,0,0.35)'; ctx.lineWidth=2.5; ctx.stroke();
    // inner wall left/right shadow strips
    ctx.save();
    ctx.beginPath(); ctx.roundRect(x-s*0.23,y-s*0.06,s*0.46,s*0.5,s*0.07); ctx.clip();
    ctx.fillStyle='rgba(0,0,0,0.12)';
    ctx.beginPath(); ctx.roundRect(x-s*0.23,y-s*0.06,s*0.06,s*0.5,0); ctx.fill();
    ctx.beginPath(); ctx.roundRect(x+s*0.17,y-s*0.06,s*0.06,s*0.5,0); ctx.fill();
    ctx.restore();
    // cocoa powder dusting
    ctx.save();
    ctx.beginPath(); ctx.ellipse(x,y-s*0.065,s*0.18,s*0.055,0,0,Math.PI*2); ctx.clip();
    ctx.fillStyle='rgba(80,30,5,0.28)';
    for (const [dx,dy,r] of [
      [-s*0.06,-s*0.065,s*0.055],[s*0.07,-s*0.055,s*0.04],
      [s*0.01,-s*0.08,s*0.03],[-s*0.1,-s*0.05,s*0.025],[s*0.12,-s*0.07,s*0.03]
    ]) {
      ctx.beginPath(); ctx.ellipse(x+dx,y+dy,r,r*0.6,Math.random()*0.8,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    // marshmallows (4 pieces, varying size)
    const marsh=[[x-s*0.09,y-s*0.1,s*0.072,s*0.048],[x+s*0.07,y-s*0.115,s*0.058,s*0.038],
                 [x+s*0.01,y-s*0.09,s*0.05,s*0.033],[x-s*0.03,y-s*0.125,s*0.045,s*0.03]];
    for (const [mx,my,rw,rh] of marsh) {
      ctx.beginPath(); ctx.ellipse(mx,my,rw,rh,0,0,Math.PI*2);
      ctx.fillStyle='#FFFAF5'; ctx.fill(); ctx.strokeStyle='rgba(210,185,170,0.5)'; ctx.lineWidth=1; ctx.stroke();
      // marshmallow top highlight
      ctx.beginPath(); ctx.ellipse(mx-rw*0.22,my-rh*0.25,rw*0.35,rh*0.28,0,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fill();
    }
    // steam lines (3 wavy)
    ctx.lineCap='round'; ctx.strokeStyle='rgba(200,160,130,0.36)'; ctx.lineWidth=1.8;
    for (const [dx,flip] of [[-s*0.1,1],[0,-1],[s*0.09,1]]) {
      ctx.beginPath();
      ctx.moveTo(x+dx,y-s*0.14);
      ctx.bezierCurveTo(x+dx+flip*s*0.07,y-s*0.27,x+dx-flip*s*0.07,y-s*0.38,x+dx+flip*s*0.04,y-s*0.5);
      ctx.stroke();
    }
    // cup shine
    ctx.fillStyle='rgba(255,255,255,0.09)';
    ctx.beginPath(); ctx.roundRect(x-s*0.19,y-s*0.04,s*0.05,s*0.3,3); ctx.fill();
  }

  _drawLollipop(ctx,x,y,s) {
    ctx.beginPath(); ctx.moveTo(x+s*0.06,y+s*0.1); ctx.lineTo(x+s*0.06,y+s*0.5);
    ctx.strokeStyle='#DDBBAA'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
    ctx.save();
    ctx.beginPath(); ctx.arc(x,y-s*0.1,s*0.3,0,Math.PI*2);
    ctx.fillStyle='#FF4488'; ctx.fill(); ctx.strokeStyle='#CC2266'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y-s*0.1,s*0.3,0,Math.PI*2); ctx.clip();
    ctx.strokeStyle='rgba(255,255,255,0.46)'; ctx.lineWidth=s*0.072; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(x,y-s*0.1,s*0.19,0,Math.PI*1.5); ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y-s*0.1,s*0.09,Math.PI*0.4,Math.PI*1.9); ctx.stroke();
    ctx.restore();
  }

  _drawMacaron(ctx,x,y,s) {
    ctx.beginPath(); ctx.ellipse(x,y+s*0.14,s*0.28,s*0.15,0,0,Math.PI*2);
    ctx.fillStyle='#FFAAD0'; ctx.fill(); ctx.strokeStyle='#FF88BB'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x,y+s*0.04,s*0.27,s*0.08,0,0,Math.PI*2);
    ctx.fillStyle='#FFE4F0'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(x,y-s*0.1,s*0.28,s*0.15,0,0,Math.PI*2);
    ctx.fillStyle='#FFAAD0'; ctx.fill(); ctx.strokeStyle='#FF88BB'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x-s*0.08,y-s*0.15,s*0.1,s*0.055,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();
  }

  _drawCamera(ctx,x,y,s) {
    // body
    ctx.fillStyle='#2A2A2A'; ctx.strokeStyle='#111'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(x-s*0.34,y-s*0.16,s*0.68,s*0.46,s*0.04); ctx.fill(); ctx.stroke();
    // viewfinder bump
    ctx.beginPath(); ctx.roundRect(x-s*0.14,y-s*0.26,s*0.2,s*0.12,3); ctx.fill(); ctx.stroke();
    // lens outer ring
    ctx.beginPath(); ctx.arc(x-s*0.06,y+s*0.06,s*0.19,0,Math.PI*2);
    ctx.fillStyle='#1A1A1A'; ctx.fill(); ctx.strokeStyle='#555'; ctx.lineWidth=3; ctx.stroke();
    // lens glass
    ctx.beginPath(); ctx.arc(x-s*0.06,y+s*0.06,s*0.13,0,Math.PI*2);
    ctx.fillStyle='#223399'; ctx.fill();
    ctx.beginPath(); ctx.arc(x-s*0.06,y+s*0.06,s*0.07,0,Math.PI*2);
    ctx.fillStyle='#1122BB'; ctx.fill();
    // lens highlight
    ctx.beginPath(); ctx.arc(x-s*0.12,y+s*0.01,s*0.038,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.38)'; ctx.fill();
    // shutter button
    ctx.beginPath(); ctx.arc(x+s*0.22,y-s*0.19,s*0.042,0,Math.PI*2);
    ctx.fillStyle='#CC3333'; ctx.fill();
    // flash
    ctx.fillStyle='#FFFFCC';
    ctx.beginPath(); ctx.roundRect(x+s*0.08,y-s*0.2,s*0.12,s*0.07,3); ctx.fill();
  }

  _drawBulgogi(ctx,x,y,s) {
    // bowl base
    ctx.fillStyle='#C89A60'; ctx.strokeStyle='#A87A40'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(x-s*0.36,y+s*0.06);
    ctx.quadraticCurveTo(x-s*0.4,y+s*0.44,x,y+s*0.5);
    ctx.quadraticCurveTo(x+s*0.4,y+s*0.44,x+s*0.36,y+s*0.06);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // bowl rim
    ctx.beginPath(); ctx.ellipse(x,y+s*0.06,s*0.36,s*0.09,0,0,Math.PI*2);
    ctx.fillStyle='#DEB878'; ctx.fill(); ctx.strokeStyle='#A87A40'; ctx.lineWidth=1.5; ctx.stroke();
    // meat pieces
    ctx.strokeStyle='#6A2010'; ctx.lineWidth=1;
    for (const [dx,dy,rot] of [[-s*0.12,-s*0.06,0.3],[s*0.1,-s*0.1,-0.4],[s*0.22,-s*0.04,0.6],[-s*0.24,-s*0.02,-0.2],[s*0.02,s*0.0,0.2],[-s*0.04,-s*0.13,0.5]]) {
      ctx.save(); ctx.translate(x+dx,y+dy); ctx.rotate(rot);
      ctx.fillStyle='#983010';
      ctx.beginPath(); ctx.ellipse(0,0,s*0.1,s*0.06,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.restore();
    }
    // green onion
    ctx.strokeStyle='#4A8A20'; ctx.lineWidth=2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x-s*0.06,y-s*0.1); ctx.lineTo(x+s*0.12,y+s*0.02); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+s*0.1,y-s*0.07); ctx.lineTo(x-s*0.06,y+s*0.03); ctx.stroke();
  }

  _drawSoju(ctx,x,y,s) {
    const bx=x, by=y-s*0.06;
    // bottle body
    ctx.fillStyle='#58A845'; ctx.strokeStyle='#38782A'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(bx-s*0.12,by+s*0.5);
    ctx.lineTo(bx-s*0.12,by+s*0.1);
    ctx.quadraticCurveTo(bx-s*0.12,by-s*0.1,bx-s*0.07,by-s*0.2);
    ctx.lineTo(bx-s*0.055,by-s*0.42);
    ctx.lineTo(bx+s*0.055,by-s*0.42);
    ctx.lineTo(bx+s*0.07,by-s*0.2);
    ctx.quadraticCurveTo(bx+s*0.12,by-s*0.1,bx+s*0.12,by+s*0.1);
    ctx.lineTo(bx+s*0.12,by+s*0.5);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // cap
    ctx.fillStyle='#E0E0E0'; ctx.strokeStyle='#AAAAAA'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(bx-s*0.06,by-s*0.52,s*0.12,s*0.12,3); ctx.fill(); ctx.stroke();
    // white label
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.roundRect(bx-s*0.09,by+s*0.04,s*0.18,s*0.28,3); ctx.fill();
    // label accent bar
    ctx.fillStyle='#2A7A2A';
    ctx.beginPath(); ctx.roundRect(bx-s*0.07,by+s*0.07,s*0.14,s*0.08,2); ctx.fill();
    // bottle shine
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.beginPath(); ctx.roundRect(bx-s*0.09,by+s*0.1,s*0.04,s*0.3,2); ctx.fill();
  }

  _drawCoffee(ctx,x,y,s) {
    // cup body (tapered)
    ctx.fillStyle='#F0E4D0'; ctx.strokeStyle='#D4C0A0'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(x-s*0.19,y-s*0.04);
    ctx.lineTo(x-s*0.23,y+s*0.44);
    ctx.lineTo(x+s*0.23,y+s*0.44);
    ctx.lineTo(x+s*0.19,y-s*0.04);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // sleeve
    ctx.fillStyle='#7A4A28'; ctx.strokeStyle='#5A3010'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(x-s*0.21,y+s*0.16);
    ctx.lineTo(x-s*0.225,y+s*0.32);
    ctx.lineTo(x+s*0.225,y+s*0.32);
    ctx.lineTo(x+s*0.21,y+s*0.16);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // dome lid
    ctx.fillStyle='#DDD0B8'; ctx.strokeStyle='#BEA888'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(x-s*0.21,y-s*0.04);
    ctx.bezierCurveTo(x-s*0.21,y-s*0.18,x+s*0.21,y-s*0.18,x+s*0.21,y-s*0.04);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // sip hole
    ctx.fillStyle='#A08060';
    ctx.beginPath(); ctx.roundRect(x-s*0.07,y-s*0.14,s*0.14,s*0.04,2); ctx.fill();
    // steam
    ctx.strokeStyle='rgba(160,130,90,0.35)'; ctx.lineWidth=1.8; ctx.lineCap='round';
    for (const [dx,flip] of [[-s*0.07,1],[s*0.06,-1]]) {
      ctx.beginPath();
      ctx.moveTo(x+dx,y-s*0.2);
      ctx.bezierCurveTo(x+dx+flip*s*0.06,y-s*0.33,x+dx-flip*s*0.06,y-s*0.43,x+dx,y-s*0.54);
      ctx.stroke();
    }
  }
  _drawOdeng(ctx,x,y,s) {
    // skewer stick
    ctx.strokeStyle='#C8A060'; ctx.lineWidth=s*0.038; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x+s*0.06,y+s*0.52); ctx.lineTo(x-s*0.04,y-s*0.48); ctx.stroke();
    // fish cake folds (3 loops on stick)
    ctx.fillStyle='#F5E0A0'; ctx.strokeStyle='#D4B860'; ctx.lineWidth=1.8;
    for (const [dy,w,h] of [[s*0.2,s*0.3,s*0.12],[s*0.02,s*0.32,s*0.13],[-s*0.18,s*0.28,s*0.11]]) {
      ctx.beginPath(); ctx.ellipse(x,y+dy,w,h,0.12,0,Math.PI*2); ctx.fill(); ctx.stroke();
    }
    // top edge highlight
    ctx.fillStyle='rgba(255,240,180,0.45)';
    ctx.beginPath(); ctx.ellipse(x-s*0.04,y-s*0.16,s*0.22,s*0.07,-0.1,0,Math.PI*2); ctx.fill();
    // steam
    ctx.strokeStyle='rgba(200,170,100,0.38)'; ctx.lineWidth=1.6; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(x-s*0.08,y-s*0.34);
    ctx.bezierCurveTo(x-s*0.18,y-s*0.46,x+s*0.02,y-s*0.56,x-s*0.08,y-s*0.66); ctx.stroke();
  }

  _drawIcecream(ctx,x,y,s) {
    // cone
    ctx.fillStyle='#E8C07A'; ctx.strokeStyle='#C89A48'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(x-s*0.22,y+s*0.12);
    ctx.lineTo(x+s*0.22,y+s*0.12);
    ctx.lineTo(x,y+s*0.52);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // cone grid lines
    ctx.strokeStyle='rgba(180,130,50,0.4)'; ctx.lineWidth=1;
    for (const t of [0.28,0.52,0.76]) {
      const w=s*0.22*(1-t*0.8);
      ctx.beginPath(); ctx.moveTo(x-w,y+s*0.12+t*s*0.4); ctx.lineTo(x+w,y+s*0.12+t*s*0.4); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(x,y+s*0.12); ctx.lineTo(x,y+s*0.52); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-s*0.11,y+s*0.12); ctx.lineTo(x-s*0.04,y+s*0.52); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+s*0.11,y+s*0.12); ctx.lineTo(x+s*0.04,y+s*0.52); ctx.stroke();
    // soft serve swirl (3 loops)
    ctx.fillStyle='#FFF5F0'; ctx.strokeStyle='#F0D0C0'; ctx.lineWidth=1.5;
    const sw=s*0.22, sh=s*0.13;
    ctx.beginPath(); ctx.ellipse(x,y+s*0.12,sw,sh,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x+s*0.04,y-s*0.04,sw*0.82,sh,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x,y-s*0.18,sw*0.62,sh*0.9,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x-s*0.02,y-s*0.3,sw*0.4,sh*0.8,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // swirl tip
    ctx.beginPath(); ctx.arc(x,y-s*0.4,sw*0.15,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // drip
    ctx.fillStyle='rgba(255,220,200,0.7)';
    ctx.beginPath(); ctx.moveTo(x+s*0.18,y+s*0.08); ctx.quadraticCurveTo(x+s*0.22,y+s*0.18,x+s*0.16,y+s*0.22); ctx.closePath(); ctx.fill();
  }

  _drawChicken(ctx,x,y,s) {
    // bone stick
    ctx.strokeStyle='#E8D8A8'; ctx.lineWidth=s*0.065; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x+s*0.08,y+s*0.54); ctx.lineTo(x+s*0.1,y+s*0.08); ctx.stroke();
    // bone knob bottom
    ctx.fillStyle='#EEE0B8'; ctx.strokeStyle='#C8B880'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(x+s*0.08,y+s*0.54,s*0.09,s*0.055,0.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // bone knob top (smaller, peeking from meat)
    ctx.beginPath(); ctx.ellipse(x+s*0.1,y+s*0.08,s*0.065,s*0.04,0.1,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // meat body shadow layer
    ctx.fillStyle='#8C3808';
    ctx.beginPath(); ctx.ellipse(x-s*0.04,y-s*0.06,s*0.33,s*0.4,0.18,0,Math.PI*2); ctx.fill();
    // main crust (dark golden brown)
    ctx.fillStyle='#C46014'; ctx.strokeStyle='#8C3808'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(x-s*0.06,y-s*0.08,s*0.31,s*0.38,0.18,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // mid crust layer (golden)
    ctx.fillStyle='#DC8020';
    ctx.beginPath(); ctx.ellipse(x-s*0.07,y-s*0.1,s*0.28,s*0.34,0.18,0,Math.PI*2); ctx.fill();
    // crispy bumps — dark shadow bumps first
    ctx.fillStyle='#A84C10';
    for (const [dx,dy,r] of [[-s*0.18,-s*0.25,s*0.09],[s*0.06,-s*0.3,s*0.08],[-s*0.26,-s*0.02,s*0.07],[s*0.1,-s*0.06,s*0.08],[-s*0.04,s*0.14,s*0.07],[-s*0.22,s*0.1,s*0.07]])
      { ctx.beginPath(); ctx.arc(x+dx,y+dy,r,0,Math.PI*2); ctx.fill(); }
    // crispy bumps — highlight bumps on top
    ctx.fillStyle='#F0A030';
    for (const [dx,dy,r] of [[-s*0.16,-s*0.26,s*0.07],[s*0.08,-s*0.28,s*0.065],[-s*0.24,-s*0.04,s*0.055],[s*0.12,-s*0.08,s*0.065],[-s*0.02,s*0.12,s*0.055],[-s*0.2,s*0.08,s*0.055]])
      { ctx.beginPath(); ctx.arc(x+dx,y+dy,r,0,Math.PI*2); ctx.fill(); }
    // light crispy tips
    ctx.fillStyle='#F8C860';
    for (const [dx,dy,r] of [[-s*0.15,-s*0.27,s*0.04],[s*0.09,-s*0.3,s*0.035],[-s*0.01,s*0.13,s*0.032]])
      { ctx.beginPath(); ctx.arc(x+dx,y+dy,r,0,Math.PI*2); ctx.fill(); }
    // oil sheen highlight
    ctx.fillStyle='rgba(255,240,180,0.38)';
    ctx.beginPath(); ctx.ellipse(x-s*0.16,y-s*0.26,s*0.09,s*0.055,-0.5,0,Math.PI*2); ctx.fill();
    // white meat peek at top near bone
    ctx.fillStyle='rgba(255,245,225,0.55)';
    ctx.beginPath(); ctx.ellipse(x+s*0.06,y+s*0.06,s*0.07,s*0.04,0.1,0,Math.PI*2); ctx.fill();
  }

  _drawTteokbokki(ctx,x,y,s) {
    // skewer stick
    ctx.strokeStyle='#C8A060'; ctx.lineWidth=s*0.04; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x,y+s*0.55); ctx.lineTo(x,y-s*0.5); ctx.stroke();
    // stick tip
    ctx.fillStyle='#C8A060';
    ctx.beginPath(); ctx.moveTo(x,y-s*0.5); ctx.lineTo(x-s*0.03,y-s*0.42); ctx.lineTo(x+s*0.03,y-s*0.42); ctx.closePath(); ctx.fill();
    // 4 tteok pieces from bottom to top
    const tH=s*0.2, tW=s*0.16, gap=s*0.02;
    const startY=y+s*0.36;
    for (let i=0;i<4;i++) {
      const ty=startY-i*(tH+gap);
      // sauce coat (slightly wider, red)
      ctx.fillStyle='#D83000'; ctx.strokeStyle='#A82000'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.ellipse(x,ty,tW+s*0.01,s*0.055,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
      // tteok side (white tube)
      ctx.fillStyle='#FFF4E8'; ctx.strokeStyle='#E8DCC8'; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(x-(tW),ty);
      ctx.lineTo(x-(tW),ty-tH);
      ctx.lineTo(x+(tW),ty-tH);
      ctx.lineTo(x+(tW),ty);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // sauce on side
      ctx.fillStyle='rgba(210,50,0,0.55)';
      ctx.beginPath();
      ctx.moveTo(x-tW,ty-tH*0.1); ctx.lineTo(x-tW,ty-tH*0.5);
      ctx.lineTo(x+tW,ty-tH*0.5); ctx.lineTo(x+tW,ty-tH*0.1);
      ctx.closePath(); ctx.fill();
      // tteok top ellipse
      ctx.fillStyle='#FFF4E8'; ctx.strokeStyle='#E0D0C0'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.ellipse(x,ty-tH,tW,s*0.055,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
      // sauce gloss on top
      ctx.fillStyle='rgba(240,60,10,0.7)';
      ctx.beginPath(); ctx.ellipse(x,ty-tH,tW,s*0.055,0,0,Math.PI*2); ctx.fill();
      // highlight
      ctx.fillStyle='rgba(255,160,100,0.4)';
      ctx.beginPath(); ctx.ellipse(x-tW*0.3,ty-tH-s*0.01,tW*0.35,s*0.025,0,0,Math.PI*2); ctx.fill();
    }
    // sauce drip
    ctx.fillStyle='rgba(200,30,0,0.6)';
    ctx.beginPath(); ctx.moveTo(x+tW*0.6,startY-tH);
    ctx.quadraticCurveTo(x+tW*0.7,startY-tH+s*0.05,x+tW*0.55,startY-tH+s*0.08);
    ctx.closePath(); ctx.fill();
  }

  _drawRamen(ctx,x,y,s) {
    // bowl outer
    ctx.fillStyle='#F0E0C0'; ctx.strokeStyle='#C8A870'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(x-s*0.36,y+s*0.08);
    ctx.quadraticCurveTo(x-s*0.38,y+s*0.46,x,y+s*0.5);
    ctx.quadraticCurveTo(x+s*0.38,y+s*0.46,x+s*0.36,y+s*0.08);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // broth
    ctx.beginPath(); ctx.ellipse(x,y+s*0.08,s*0.36,s*0.09,0,0,Math.PI*2);
    ctx.fillStyle='#C85020'; ctx.fill();
    // noodle swirls
    ctx.strokeStyle='#F8E8B0'; ctx.lineWidth=2; ctx.lineCap='round';
    for (const [cx2,cy2,r,sa,ea] of [
      [x-s*0.1,y+s*0.16,s*0.12,0.2,Math.PI*1.8],
      [x+s*0.08,y+s*0.2,s*0.1,-0.3,Math.PI*1.6],
      [x-s*0.04,y+s*0.3,s*0.14,0.4,Math.PI*1.9],
    ]) {
      ctx.beginPath(); ctx.arc(cx2,cy2,r,sa,ea); ctx.stroke();
    }
    // egg half
    ctx.fillStyle='#FFF8E0'; ctx.strokeStyle='#E0D090'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(x+s*0.18,y+s*0.18,s*0.1,s*0.08,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#F8B820';
    ctx.beginPath(); ctx.arc(x+s*0.18,y+s*0.18,s*0.05,0,Math.PI*2); ctx.fill();
    // steam
    ctx.strokeStyle='rgba(220,160,80,0.38)'; ctx.lineWidth=1.8; ctx.lineCap='round';
    for (const [dx,flip] of [[-s*0.1,1],[s*0.08,-1]]) {
      ctx.beginPath();
      ctx.moveTo(x+dx,y-s*0.04);
      ctx.bezierCurveTo(x+dx+flip*s*0.07,y-s*0.18,x+dx-flip*s*0.07,y-s*0.3,x+dx,y-s*0.42);
      ctx.stroke();
    }
  }

  _drawPajeon(ctx,x,y,s) {
    // plate
    ctx.fillStyle='#E0C890'; ctx.strokeStyle='#C0A060'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(x,y+s*0.36,s*0.38,s*0.09,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // plate shadow under pancake
    ctx.fillStyle='rgba(140,100,20,0.15)';
    ctx.beginPath(); ctx.ellipse(x+s*0.02,y+s*0.32,s*0.3,s*0.07,0,0,Math.PI*2); ctx.fill();
    // pancake base (gradient — center lighter, edge darker golden)
    const pjG=ctx.createRadialGradient(x-s*0.05,y-s*0.04,s*0.05,x,y+s*0.08,s*0.35);
    pjG.addColorStop(0,'#E8C040'); pjG.addColorStop(0.65,'#C89820'); pjG.addColorStop(1,'#A07010');
    ctx.beginPath(); ctx.ellipse(x,y+s*0.08,s*0.34,s*0.28,0,0,Math.PI*2);
    ctx.fillStyle=pjG; ctx.fill(); ctx.strokeStyle='#907010'; ctx.lineWidth=1.5; ctx.stroke();
    // crispy edge ring (darker band)
    ctx.save();
    ctx.beginPath(); ctx.ellipse(x,y+s*0.08,s*0.34,s*0.28,0,0,Math.PI*2);
    ctx.arc(x,y+s*0.08,s*0.25,0,Math.PI*2,true); ctx.fillStyle='rgba(120,72,5,0.32)'; ctx.fill();
    ctx.restore();
    // random brown toasted spots
    const spots=[[-s*0.16,y-s*0.08,s*0.072,s*0.045,0.3],[s*0.14,y+s*0.06,s*0.08,s*0.05,-0.2],
                 [s*0.0,y+s*0.18,s*0.065,s*0.04,0.1],[-s*0.08,y+s*0.14,s*0.055,s*0.035,-0.4],
                 [s*0.18,y-s*0.06,s*0.05,s*0.03,0.5],[-s*0.22,y+s*0.1,s*0.04,s*0.025,-0.1]];
    ctx.fillStyle='rgba(140,82,8,0.3)';
    for (const [dx,sy,rw,rh,ang] of spots) {
      ctx.beginPath(); ctx.ellipse(x+dx,sy,rw,rh,ang,0,Math.PI*2); ctx.fill();
    }
    // green onion leaves — filled ribbon shapes (not lines)
    ctx.save();
    ctx.beginPath(); ctx.ellipse(x,y+s*0.08,s*0.33,s*0.27,0,0,Math.PI*2); ctx.clip();
    const drawLeaf=(sx,sy,ex,ey,hw,bow)=>{
      const dx=ex-sx,dy=ey-sy,len=Math.hypot(dx,dy);
      if(len<1) return;
      const nx=dx/len,ny=dy/len,px=-ny,py=nx;
      const mx=(sx+ex)/2+px*bow, my=(sy+ey)/2+py*bow;
      const s1x=sx+px*hw,s1y=sy+py*hw; // left base
      const e1x=ex+px*hw,e1y=ey+py*hw; // left tip
      const s2x=sx-px*hw,s2y=sy-py*hw; // right base
      const e2x=ex-px*hw,e2y=ey-py*hw; // right tip
      const c1x=mx+px*hw,c1y=my+py*hw;
      const c2x=mx-px*hw,c2y=my-py*hw;
      ctx.beginPath();
      ctx.moveTo(s1x,s1y);
      ctx.quadraticCurveTo(c1x,c1y,e1x,e1y);                          // left edge curved
      ctx.quadraticCurveTo(ex+nx*hw*1.5,ey+ny*hw*1.5,e2x,e2y);        // rounded tip
      ctx.quadraticCurveTo(c2x,c2y,s2x,s2y);                          // right edge curved
      ctx.quadraticCurveTo(sx-nx*hw*1.5,sy-ny*hw*1.5,s1x,s1y);        // rounded base
      ctx.closePath();
      // width-direction gradient for depth
      const g=ctx.createLinearGradient(s1x,s1y,s2x,s2y);
      g.addColorStop(0,'#255815'); g.addColorStop(0.28,'#4EA028');
      g.addColorStop(0.6,'#58B030'); g.addColorStop(1,'#226012');
      ctx.fillStyle=g; ctx.fill();
      // center vein (midrib)
      ctx.beginPath();
      ctx.moveTo(sx+nx*hw*0.4,sy+ny*hw*0.4);
      ctx.quadraticCurveTo(mx,my,ex-nx*hw*0.4,ey-ny*hw*0.4);
      ctx.strokeStyle='rgba(18,65,5,0.28)'; ctx.lineWidth=hw*0.5; ctx.lineCap='round'; ctx.stroke();
    };
    // leaves: [sx, sy, ex, ey, halfWidth, bow]
    drawLeaf(x-s*0.29,y+s*0.14, x+s*0.21,y+s*0.0,  s*0.032,  s*0.048);
    drawLeaf(x-s*0.14,y+s*0.23, x+s*0.29,y+s*0.09, s*0.028, -s*0.05);
    drawLeaf(x-s*0.25,y-s*0.03, x+s*0.17,y-s*0.15, s*0.026,  s*0.04);
    drawLeaf(x-s*0.04,y+s*0.27, x+s*0.22,y+s*0.1,  s*0.029, -s*0.042);
    drawLeaf(x-s*0.31,y+s*0.07, x+s*0.05,y-s*0.02, s*0.022,  s*0.032);
    drawLeaf(x+s*0.01,y-s*0.17, x+s*0.29,y-s*0.04, s*0.025,  s*0.044);
    ctx.restore();
    // oil gloss highlight
    ctx.fillStyle='rgba(255,245,140,0.18)';
    ctx.beginPath(); ctx.ellipse(x-s*0.08,y-s*0.06,s*0.18,s*0.11,-0.35,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,200,0.12)';
    ctx.beginPath(); ctx.ellipse(x+s*0.1,y+s*0.12,s*0.1,s*0.065,0.2,0,Math.PI*2); ctx.fill();
  }

  _drawSamgyeopsal(ctx,x,y,s) {
    // grill plate outer
    const grillG=ctx.createRadialGradient(x,y+s*0.32,s*0.04,x,y+s*0.32,s*0.4);
    grillG.addColorStop(0,'#4A4040'); grillG.addColorStop(1,'#2A2020');
    ctx.beginPath(); ctx.ellipse(x,y+s*0.32,s*0.38,s*0.1,0,0,Math.PI*2);
    ctx.fillStyle=grillG; ctx.fill(); ctx.strokeStyle='#1A1010'; ctx.lineWidth=2; ctx.stroke();
    // grill surface (inner)
    ctx.beginPath(); ctx.ellipse(x,y+s*0.32,s*0.3,s*0.075,0,0,Math.PI*2);
    ctx.fillStyle='#302828'; ctx.fill();
    // grill bars (horizontal ridges)
    ctx.strokeStyle='#1C1414'; ctx.lineWidth=2; ctx.lineCap='round';
    for (const [ox,oy,len] of [[-s*0.22,y+s*0.26,s*0.44],[-s*0.26,y+s*0.32,s*0.52],[-s*0.22,y+s*0.38,s*0.44]]) {
      ctx.beginPath(); ctx.moveTo(x+ox,oy); ctx.lineTo(x+ox+len,oy); ctx.stroke();
    }
    // pork belly slices (3 pieces)
    for (const [dx,dy,rot] of [[-s*0.15,s*0.04,-0.22],[s*0.0,s*0.0,0.08],[s*0.15,s*0.03,0.28]]) {
      ctx.save(); ctx.translate(x+dx,y+dy); ctx.rotate(rot);
      const fw=s*0.12, fh=s*0.22;
      // outer edge shadow
      ctx.fillStyle='rgba(0,0,0,0.18)';
      ctx.beginPath(); ctx.roundRect(-fw+s*0.008,s*0.005,fw*2,fh,5); ctx.fill();
      // fat layer (top, creamy white)
      const fatG=ctx.createLinearGradient(-fw,0,fw,0);
      fatG.addColorStop(0,'#E8D0BC'); fatG.addColorStop(0.5,'#F8EAD8'); fatG.addColorStop(1,'#DEC8B0');
      ctx.beginPath(); ctx.roundRect(-fw,0,fw*2,fh*0.38,4);
      ctx.fillStyle=fatG; ctx.fill();
      ctx.strokeStyle='#C8B0A0'; ctx.lineWidth=0.8; ctx.stroke();
      // thin fat stripe in middle
      ctx.fillStyle='rgba(255,248,235,0.65)';
      ctx.beginPath(); ctx.roundRect(-fw,fh*0.38,fw*2,fh*0.1,0); ctx.fill();
      // meat layer (red/brown gradient)
      const meatG=ctx.createLinearGradient(-fw,0,fw,0);
      meatG.addColorStop(0,'#B04020'); meatG.addColorStop(0.5,'#D05030'); meatG.addColorStop(1,'#A03018');
      ctx.beginPath(); ctx.roundRect(-fw,fh*0.48,fw*2,fh*0.52,{bl:4,br:4,tl:0,tr:0});
      ctx.fillStyle=meatG; ctx.fill();
      ctx.strokeStyle='#8A2810'; ctx.lineWidth=0.8; ctx.stroke();
      // grill marks on meat (dark diagonal lines)
      ctx.save();
      ctx.beginPath(); ctx.roundRect(-fw,fh*0.48,fw*2,fh*0.52,{bl:4,br:4,tl:0,tr:0}); ctx.clip();
      ctx.strokeStyle='rgba(50,10,5,0.45)'; ctx.lineWidth=1.4;
      for (const gx of [-fw*0.5,0,fw*0.5]) {
        ctx.beginPath(); ctx.moveTo(gx-s*0.02,fh*0.48); ctx.lineTo(gx+s*0.02,fh); ctx.stroke();
      }
      ctx.restore();
      // meat surface highlight
      ctx.fillStyle='rgba(255,160,100,0.22)';
      ctx.beginPath(); ctx.ellipse(-fw*0.3,fh*0.65,fw*0.5,fh*0.12,0,0,Math.PI*2); ctx.fill();
      // fat top highlight
      ctx.fillStyle='rgba(255,255,245,0.35)';
      ctx.beginPath(); ctx.ellipse(-fw*0.2,fh*0.12,fw*0.55,fh*0.1,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    // sizzle smoke (3 wisps)
    ctx.lineCap='round';
    for (const [dx,flip,op] of [[-s*0.12,1,0.32],[s*0.02,-1,0.28],[s*0.14,1,0.22]]) {
      ctx.beginPath();
      ctx.moveTo(x+dx,y-s*0.04);
      ctx.bezierCurveTo(x+dx+flip*s*0.08,y-s*0.16,x+dx-flip*s*0.06,y-s*0.26,x+dx+flip*s*0.04,y-s*0.36);
      ctx.strokeStyle=`rgba(190,170,150,${op})`; ctx.lineWidth=1.5; ctx.stroke();
    }
  }
}

// ── Accessory ─────────────────────────────────────────────
class Accessory {
  constructor(type,idx) {
    this.type=type; this.idx=idx;
    this.worn=false; this.wornSide='right'; this.dragging=false;
    this.x=0; this.y=0; this._syncPanel();
  }
  _syncPanel() {
    const pw=Math.min(W*0.13,72);
    this.panelX=8+pw/2; this.panelY=H*0.09+this.idx*H*0.10;
    if (!this.worn&&!this.dragging) { this.x=this.panelX; this.y=this.panelY; }
  }
  get _panelS() { return Math.min(W*0.08,50); }
  get _wornS() {
    const r=pig.r;
    if (this.type==='crown') return r*0.65;
    if (this.type==='ribbon'||this.type==='ribbon_purple') return r*0.42;
    if (this.type==='beanie') return r*0.65;
    if (this.type==='scarf') return r*0.68;
    return r*0.82;
  }
  _wornPos() {
    const {cx,cy,r}=pig;
    if (this.type==='crown') return {x:cx,y:cy-r*1.18};
    if (this.type==='ribbon'||this.type==='ribbon_purple') {
      const sign=this.wornSide==='left'?-1:1;
      return {x:cx+sign*r*0.42,y:cy-r*0.72};
    }
    if (this.type==='beanie') return {x:cx,y:cy-r*1.02};
    if (this.type==='scarf') return {x:cx,y:cy+r*0.82};
    return {x:cx,y:cy-r*0.1};
  }
  hitTest(mx,my) {
    let hx,hy;
    if (this.worn) { const p=this._wornPos(); hx=p.x; hy=p.y; }
    else if (this.dragging) { hx=this.x; hy=this.y; }
    else {
      hx=this.panelX; hy=this.panelY-panelScroll;
      const pw=Math.min(W*0.13,72);
      if (mx<8||mx>8+pw||my<H*0.04||my>H*0.04+H*0.44) return false;
    }
    const s=this.worn?this._wornS:this._panelS;
    return Math.hypot(mx-hx,my-hy)<s*0.85;
  }
  startDrag() {
    if (this.worn) { const p=this._wornPos(); this.x=p.x; this.y=p.y; this.worn=false; }
    this.dragging=true;
  }
  moveTo(x,y) { if(this.dragging){this.x=x;this.y=y;} }
  endDrag() {
    this.dragging=false;
    if (Math.hypot(this.x-pig.cx,this.y-pig.cy)<pig.r*1.8) {
      this.worn=true;
      if (this.type==='ribbon'||this.type==='ribbon_purple') {
        const dl=Math.hypot(this.x-(pig.cx-pig.r*0.42),this.y-(pig.cy-pig.r*0.72));
        const dr=Math.hypot(this.x-(pig.cx+pig.r*0.42),this.y-(pig.cy-pig.r*0.72));
        this.wornSide=dl<dr?'left':'right';
      }
    } else { this.worn=false; this.x=this.panelX; this.y=this.panelY; }
  }
  draw(ctx) {
    const {x,y}=this.worn?this._wornPos():this;
    const s=this.worn?this._wornS:this._panelS;
    if (this.type==='crown')              this._crown(ctx,x,y,s);
    else if (this.type==='ribbon')        this._ribbon(ctx,x,y,s,'#FF1493','#CC0066','#FF55AA');
    else if (this.type==='ribbon_purple') this._ribbon(ctx,x,y,s,'#9933CC','#6611AA','#BB55EE');
    else if (this.type==='beanie')        this._beanie(ctx,x,y,s);
    else if (this.type==='scarf')         this._scarf(ctx,x,y,s);
    else                                  this._glasses(ctx,x,y,s);
  }
  _crown(ctx,x,y,s) {
    ctx.save();
    ctx.beginPath(); ctx.moveTo(x-s*0.5,y+s*0.35); ctx.lineTo(x-s*0.5,y+s*0.05); ctx.lineTo(x-s*0.15,y-s*0.38);
    ctx.lineTo(x,y-s*0.62); ctx.lineTo(x+s*0.15,y-s*0.38); ctx.lineTo(x+s*0.5,y+s*0.05); ctx.lineTo(x+s*0.5,y+s*0.35); ctx.closePath();
    ctx.fillStyle='#FFD700'; ctx.fill(); ctx.strokeStyle='#BF9B00'; ctx.lineWidth=Math.max(1.5,s*0.04); ctx.stroke();
    for (const [gx,gy,gc] of [[x,y-s*0.57,'#FF99CC'],[x-s*0.28,y,'#99DDFF'],[x+s*0.28,y,'#AAFFAA']]) {
      ctx.beginPath(); ctx.arc(gx,gy,Math.max(2,s*0.1),0,Math.PI*2); ctx.fillStyle=gc; ctx.fill();
    }
    ctx.restore();
  }
  _ribbon(ctx,x,y,s,c1,c2,c3) {
    ctx.save(); ctx.lineWidth=Math.max(1.5,s*0.04);
    for (const sign of [-1,1]) {
      ctx.beginPath(); ctx.moveTo(x,y);
      ctx.bezierCurveTo(x+sign*s*0.15,y-s*0.45,x+sign*s*0.6,y-s*0.3,x+sign*s*0.55,y);
      ctx.bezierCurveTo(x+sign*s*0.6,y+s*0.3,x+sign*s*0.15,y+s*0.45,x,y);
      ctx.fillStyle=c1; ctx.fill(); ctx.strokeStyle=c2; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(x,y,s*0.13,0,Math.PI*2); ctx.fillStyle=c3; ctx.fill(); ctx.strokeStyle=c2; ctx.stroke();
    ctx.restore();
  }
  _glasses(ctx,x,y,s) {
    ctx.save();
    const fw=s*0.42,fh=s*0.32,gap=s*0.12,rad=Math.max(2,s*0.06);
    ctx.lineWidth=Math.max(2,s*0.06); ctx.strokeStyle='#55AADD'; ctx.fillStyle='rgba(135,206,235,0.28)';
    ctx.beginPath(); ctx.roundRect(x-gap-fw,y-fh/2,fw,fh,rad); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.roundRect(x+gap,y-fh/2,fw,fh,rad); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-gap,y+fh*0.05); ctx.lineTo(x+gap,y+fh*0.05); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x-gap-fw,y+fh*0.05); ctx.lineTo(x-gap-fw-s*0.22,y+fh*0.18);
    ctx.moveTo(x+gap+fw,y+fh*0.05); ctx.lineTo(x+gap+fw+s*0.22,y+fh*0.18);
    ctx.stroke(); ctx.restore();
  }
  _beanie(ctx,x,y,s) {
    ctx.save();
    ctx.beginPath(); ctx.arc(x,y+s*0.1,s*0.5,Math.PI,0); ctx.closePath();
    ctx.fillStyle='#FF6633'; ctx.fill();
    for (const yo of [s*0.04,-s*0.09]) {
      ctx.save(); ctx.beginPath(); ctx.arc(x,y+s*0.1,s*0.5,Math.PI,0); ctx.closePath(); ctx.clip();
      ctx.fillStyle='rgba(255,255,255,0.33)'; ctx.fillRect(x-s*0.55,y+yo,s*1.1,s*0.1); ctx.restore();
    }
    ctx.beginPath(); ctx.roundRect(x-s*0.52,y+s*0.1,s*1.04,s*0.2,3);
    ctx.fillStyle='#CC4411'; ctx.fill(); ctx.strokeStyle='#AA2200'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y-s*0.4,s*0.14,0,Math.PI*2);
    ctx.fillStyle='#FFEECC'; ctx.fill(); ctx.strokeStyle='#DDCCAA'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
  }
  _scarf(ctx,x,y,s) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x-s*0.09,y+s*0.13); ctx.lineTo(x+s*0.09,y+s*0.13);
    ctx.lineTo(x+s*0.20,y+s*0.58); ctx.lineTo(x,y+s*0.74); ctx.lineTo(x-s*0.20,y+s*0.58);
    ctx.closePath();
    ctx.fillStyle='#2299BB'; ctx.fill(); ctx.strokeStyle='#0077AA'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x-s*0.09,y+s*0.13); ctx.lineTo(x+s*0.09,y+s*0.13);
    ctx.lineTo(x+s*0.20,y+s*0.58); ctx.lineTo(x,y+s*0.74); ctx.lineTo(x-s*0.20,y+s*0.58);
    ctx.closePath(); ctx.clip();
    for (let i=0;i<=5;i++) {
      ctx.fillStyle='rgba(255,255,255,0.28)';
      ctx.fillRect(x-s*0.24,y+s*0.16+i*s*0.10,s*0.48,s*0.05);
    }
    ctx.restore();
    ctx.beginPath();
    ctx.moveTo(x,y-s*0.16); ctx.lineTo(x+s*0.17,y); ctx.lineTo(x,y+s*0.16); ctx.lineTo(x-s*0.17,y);
    ctx.closePath();
    ctx.fillStyle='#2299BB'; ctx.fill(); ctx.strokeStyle='#0077AA'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x,y-s*0.16); ctx.lineTo(x+s*0.17,y); ctx.lineTo(x,y+s*0.16); ctx.lineTo(x-s*0.17,y);
    ctx.closePath(); ctx.clip();
    for (let i=-1;i<=1;i++) {
      ctx.fillStyle='rgba(255,255,255,0.28)';
      ctx.fillRect(x+i*s*0.10-s*0.03,y-s*0.2,s*0.06,s*0.4);
    }
    ctx.restore();
    ctx.restore();
  }
}

// ── Panel background ──────────────────────────────────────
function drawAccessoryPanel() {
  const pw=Math.min(W*0.13,72), ph=H*0.44;
  ctx.save();
  ctx.fillStyle='rgba(255,240,250,0.62)'; ctx.strokeStyle='rgba(255,175,210,0.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(8,H*0.04,pw,ph,18); ctx.fill(); ctx.stroke();
  if (panelMaxScroll>0) {
    const barH=Math.max(18,ph*ph/(ph+panelMaxScroll));
    const barY=H*0.04+(ph-barH)*(panelScroll/panelMaxScroll);
    ctx.fillStyle='rgba(220,160,200,0.35)';
    ctx.beginPath(); ctx.roundRect(8+pw-5,H*0.04+3,3,ph-6,2); ctx.fill();
    ctx.fillStyle='rgba(180,80,160,0.62)';
    ctx.beginPath(); ctx.roundRect(8+pw-5,barY,3,barH,2); ctx.fill();
  }
  ctx.restore();
}

// ── Cloud ─────────────────────────────────────────────────
function drawCloud(cx,cy,cr,fill,shadow) {
  ctx.save();
  ctx.fillStyle=fill; ctx.shadowColor=shadow; ctx.shadowBlur=8;
  for (const [dx,dy,dr] of [[0,0,1],[-0.65,0.25,0.72],[0.65,0.25,0.72],[0.28,-0.38,0.65],[-0.28,-0.38,0.65]]) {
    ctx.beginPath(); ctx.arc(cx+dx*cr,cy+dy*cr,cr*dr,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── Scene Background ──────────────────────────────────────
function drawSceneBackground(scene,ox) {
  const gy=H*scene.groundY;
  ctx.save();
  ctx.beginPath(); ctx.rect(ox,0,W,H); ctx.clip();

  // Sky
  const sky=ctx.createLinearGradient(ox,0,ox,gy);
  scene.sky.forEach((c,i,a)=>sky.addColorStop(i/(a.length-1),c));
  ctx.fillStyle=sky; ctx.fillRect(ox,0,W,gy);

  // Ground
  const grd=ctx.createLinearGradient(ox,gy,ox,H);
  scene.ground.forEach((c,i,a)=>grd.addColorStop(i/(a.length-1),c));
  ctx.fillStyle=grd; ctx.fillRect(ox,gy,W,H-gy);

  // Decorations
  drawSceneDecorations(scene,ox);

  // Pig shadow
  ctx.fillStyle=scene.shadowColor;
  ctx.beginPath(); ctx.ellipse(ox+W/2,gy+H*0.015,W*0.11,H*0.018,0,0,Math.PI*2); ctx.fill();

  // Clouds
  if (scene.cloudFill) {
    for (const c of CLOUDS)
      drawCloud(ox+c.rx*W,c.ry*H,c.rs*Math.min(W,H),scene.cloudFill,scene.cloudShadow||'rgba(100,140,200,0.2)');
  }

  ctx.restore();
}

// ── Scene Decorations ─────────────────────────────────────
function drawSceneDecorations(scene,ox) {
  const gy=H*scene.groundY;
  if (scene.id==='spring') {
    for (const [rx,ry] of [[0.1,0.64],[0.28,0.66],[0.55,0.63],[0.72,0.65],[0.88,0.62]])
      _bgFlower(ox+rx*W,ry*H,H*0.022);
  }
  else if (scene.id==='sunset') {
    const sx=ox+W*0.7, sy=gy;
    // horizon warm glow band
    const hg=ctx.createLinearGradient(ox,gy-H*0.3,ox,gy);
    hg.addColorStop(0,'rgba(255,140,50,0)'); hg.addColorStop(1,'rgba(255,200,80,0.28)');
    ctx.fillStyle=hg; ctx.fillRect(ox,gy-H*0.3,W,H*0.3);
    // sun rays (clipped to sky)
    ctx.save(); ctx.beginPath(); ctx.rect(ox,0,W,gy); ctx.clip();
    ctx.save(); ctx.translate(sx,sy);
    for (let i=0;i<14;i++) {
      const a=(i/14)*Math.PI*2, sp=0.07;
      const rg=ctx.createLinearGradient(0,0,Math.cos(a)*H*0.32,Math.sin(a)*H*0.32);
      rg.addColorStop(0,'rgba(255,220,100,0.14)'); rg.addColorStop(1,'rgba(255,160,30,0)');
      ctx.fillStyle=rg;
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(a-sp)*H*0.32,Math.sin(a-sp)*H*0.32);
      ctx.lineTo(Math.cos(a+sp)*H*0.32,Math.sin(a+sp)*H*0.32);
      ctx.fill();
    }
    ctx.restore();
    // sun glow halo
    const gw=ctx.createRadialGradient(sx,sy,H*0.04,sx,sy,H*0.27);
    gw.addColorStop(0,'rgba(255,230,100,0.72)');
    gw.addColorStop(0.28,'rgba(255,130,40,0.38)');
    gw.addColorStop(1,'rgba(240,80,0,0)');
    ctx.fillStyle=gw; ctx.beginPath(); ctx.arc(sx,sy,H*0.27,0,Math.PI*2); ctx.fill();
    // sun disc (half above horizon)
    ctx.beginPath(); ctx.arc(sx,sy,H*0.075,Math.PI,0);
    ctx.fillStyle='#FFE858'; ctx.fill();
    ctx.restore();
    // rolling hills silhouette (mid-dark)
    ctx.fillStyle='rgba(60,22,8,0.52)';
    ctx.beginPath(); ctx.moveTo(ox,gy);
    ctx.quadraticCurveTo(ox+W*0.18,gy-H*0.13,ox+W*0.36,gy);
    ctx.quadraticCurveTo(ox+W*0.54,gy-H*0.17,ox+W*0.72,gy);
    ctx.quadraticCurveTo(ox+W*0.86,gy-H*0.1,ox+W,gy);
    ctx.lineTo(ox+W,gy+H*0.04); ctx.lineTo(ox,gy+H*0.04); ctx.closePath(); ctx.fill();
    // pine tree silhouettes
    ctx.fillStyle='rgba(14,52,18,0.92)';
    _sunsetTree(ox+W*0.07,gy,H*0.3);
    _sunsetTree(ox+W*0.13,gy,H*0.23);
    _sunsetTree(ox+W*0.88,gy,H*0.26);
    _sunsetTree(ox+W*0.94,gy,H*0.2);
    // birds
    ctx.strokeStyle='rgba(25,8,2,0.62)'; ctx.lineWidth=1.8; ctx.lineCap='round';
    for (const [rx,ry,sc] of [[0.32,0.17,1],[0.37,0.14,0.82],[0.42,0.19,0.92],[0.46,0.12,0.72],[0.27,0.21,0.78]]) {
      const bx=ox+rx*W, by=ry*H, bs=H*0.013*sc;
      ctx.beginPath();
      ctx.moveTo(bx-bs,by+bs*0.4);
      ctx.quadraticCurveTo(bx-bs*0.4,by-bs*0.35,bx,by);
      ctx.quadraticCurveTo(bx+bs*0.4,by-bs*0.35,bx+bs,by+bs*0.4);
      ctx.stroke();
    }
  }
  else if (scene.id==='night') {
    ctx.save();
    for (let si=0;si<NIGHT_STARS.length;si++) {
      const [rx,ry]=NIGHT_STARS[si];
      const pulse=0.55+0.45*Math.sin(starPulse*0.04+si*1.3);
      const baseR=H*0.005+Math.sin(rx*37)*H*0.003;
      ctx.globalAlpha=0.45+0.55*pulse;
      ctx.fillStyle='rgba(255,255,220,1)';
      ctx.beginPath(); ctx.arc(ox+rx*W,ry*H,baseR*(0.7+0.5*pulse),0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    const mx=ox+W*0.82, my=H*0.1, mr=H*0.07;
    ctx.save();
    ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fillStyle='#FFFFCC'; ctx.fill();
    ctx.beginPath(); ctx.arc(mx+mr*0.42,my-mr*0.08,mr*0.82,0,Math.PI*2);
    ctx.fillStyle='#152850'; ctx.fill();
    ctx.restore();
  }
  else if (scene.id==='rainy') {
    ctx.save();
    for (const [rx,ry] of [[0.2,0.63],[0.55,0.65],[0.78,0.62]]) {
      ctx.globalAlpha=0.32;
      ctx.beginPath(); ctx.ellipse(ox+rx*W,ry*H,W*0.055,H*0.013,0,0,Math.PI*2);
      ctx.fillStyle='#7AAABB'; ctx.fill();
    }
    ctx.restore();
    _drawLightningBolt(ox+LIGHTNING.rx*W, LIGHTNING.ry*H);
  }
  else if (scene.id==='cozy') {
    ctx.fillStyle='rgba(100,65,30,0.42)';
    ctx.fillRect(ox,gy-H*0.012,W,H*0.012);
    const wx=ox+W*0.68, wy=H*0.08, ww=W*0.22, wh=H*0.28;
    // window glass
    ctx.fillStyle='#C8E8F8'; ctx.fillRect(wx,wy,ww,wh);
    // window cross divider
    ctx.strokeStyle='#D4C4A8'; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(wx+ww/2,wy); ctx.lineTo(wx+ww/2,wy+wh);
    ctx.moveTo(wx,wy+wh*0.48); ctx.lineTo(wx+ww,wy+wh*0.48);
    ctx.stroke();
    // window frame
    ctx.strokeStyle='#C4A880'; ctx.lineWidth=5; ctx.strokeRect(wx,wy,ww,wh);
    // curtain rod
    ctx.strokeStyle='#A08060'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(wx-ww*0.1,wy-H*0.008); ctx.lineTo(wx+ww+ww*0.1,wy-H*0.008); ctx.stroke();
    ctx.fillStyle='#A08060';
    ctx.beginPath(); ctx.arc(wx-ww*0.1,wy-H*0.008,H*0.008,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(wx+ww+ww*0.1,wy-H*0.008,H*0.008,0,Math.PI*2); ctx.fill();
    // left curtain panel with folds
    { const cx0=wx-ww*0.08, cy0=wy-H*0.012, cpw=ww*0.38, cph=wh+H*0.035;
      ctx.fillStyle='rgba(170,115,130,0.82)';
      ctx.beginPath();
      ctx.moveTo(cx0,cy0);
      ctx.bezierCurveTo(cx0+cpw*0.55,cy0+cph*0.15, cx0+cpw*0.3,cy0+cph*0.45, cx0+cpw*0.45,cy0+cph);
      ctx.lineTo(cx0,cy0+cph); ctx.closePath(); ctx.fill();
      // fold highlight
      ctx.strokeStyle='rgba(210,160,175,0.55)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(cx0+cpw*0.14,cy0+cph*0.08);
      ctx.bezierCurveTo(cx0+cpw*0.3,cy0+cph*0.25, cx0+cpw*0.18,cy0+cph*0.55, cx0+cpw*0.28,cy0+cph*0.88);
      ctx.stroke();
    }
    // right curtain panel with folds
    { const cx0=wx+ww+ww*0.08, cy0=wy-H*0.012, cpw=ww*0.38, cph=wh+H*0.035;
      ctx.fillStyle='rgba(170,115,130,0.82)';
      ctx.beginPath();
      ctx.moveTo(cx0,cy0);
      ctx.bezierCurveTo(cx0-cpw*0.55,cy0+cph*0.15, cx0-cpw*0.3,cy0+cph*0.45, cx0-cpw*0.45,cy0+cph);
      ctx.lineTo(cx0,cy0+cph); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(210,160,175,0.55)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(cx0-cpw*0.14,cy0+cph*0.08);
      ctx.bezierCurveTo(cx0-cpw*0.3,cy0+cph*0.25, cx0-cpw*0.18,cy0+cph*0.55, cx0-cpw*0.28,cy0+cph*0.88);
      ctx.stroke();
    }
    ctx.save(); ctx.globalAlpha=0.68;
    ctx.beginPath(); ctx.ellipse(ox+W*0.5,gy+H*0.04,W*0.26,H*0.05,0,0,Math.PI*2);
    ctx.fillStyle='#CC7744'; ctx.fill(); ctx.strokeStyle='#AA5522'; ctx.lineWidth=2; ctx.stroke();
    ctx.globalAlpha=0.45;
    ctx.beginPath(); ctx.ellipse(ox+W*0.5,gy+H*0.04,W*0.2,H*0.036,0,0,Math.PI*2);
    ctx.strokeStyle='#FFAA66'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
    // 1인용 카우치 소파 (와인 컬러)
    { const sx=ox+W*0.04, sy=gy-H*0.2, sw=W*0.28, sh=H*0.17;
      const cDark='#4A1828', cMid='#6B2440', cLight='#8C3458', cHighlight='#A84870';
      const legH=H*0.022, legW=W*0.016;
      // legs
      ctx.fillStyle='#2E1008';
      ctx.beginPath(); ctx.roundRect(sx+sw*0.1,sy+sh,legW,legH,3); ctx.fill();
      ctx.beginPath(); ctx.roundRect(sx+sw*0.86,sy+sh,legW,legH,3); ctx.fill();
      // body frame (outer shadow)
      ctx.fillStyle=cDark;
      ctx.beginPath(); ctx.roundRect(sx,sy+sh*0.22,sw,sh*0.78,[6,6,10,10]); ctx.fill();
      // backrest
      ctx.fillStyle=cDark;
      ctx.beginPath(); ctx.roundRect(sx+sw*0.1,sy,sw*0.8,sh*0.7,[14,14,4,4]); ctx.fill();
      ctx.fillStyle=cMid;
      ctx.beginPath(); ctx.roundRect(sx+sw*0.12,sy+sh*0.04,sw*0.76,sh*0.56,[12,12,4,4]); ctx.fill();
      // backrest top highlight strip
      ctx.fillStyle=cLight;
      ctx.beginPath(); ctx.roundRect(sx+sw*0.14,sy+sh*0.05,sw*0.72,sh*0.14,[10,10,2,2]); ctx.fill();
      // seat cushion
      ctx.fillStyle=cMid;
      ctx.beginPath(); ctx.roundRect(sx+sw*0.1,sy+sh*0.52,sw*0.8,sh*0.46,[4,4,8,8]); ctx.fill();
      ctx.fillStyle=cLight;
      ctx.beginPath(); ctx.roundRect(sx+sw*0.12,sy+sh*0.54,sw*0.76,sh*0.22,[6,6,2,2]); ctx.fill();
      // cushion crease line
      ctx.strokeStyle=cDark; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(sx+sw*0.5,sy+sh*0.54); ctx.lineTo(sx+sw*0.5,sy+sh*0.98); ctx.stroke();
      // left armrest
      ctx.fillStyle=cDark;
      ctx.beginPath(); ctx.roundRect(sx,sy+sh*0.2,sw*0.12,sh*0.8,[8,4,6,8]); ctx.fill();
      ctx.fillStyle=cLight;
      ctx.beginPath(); ctx.roundRect(sx-sw*0.005,sy+sh*0.18,sw*0.13,sh*0.12,[6,6,2,2]); ctx.fill();
      // right armrest
      ctx.fillStyle=cDark;
      ctx.beginPath(); ctx.roundRect(sx+sw*0.88,sy+sh*0.2,sw*0.12,sh*0.8,[4,8,8,6]); ctx.fill();
      ctx.fillStyle=cLight;
      ctx.beginPath(); ctx.roundRect(sx+sw*0.875,sy+sh*0.18,sw*0.13,sh*0.12,[6,6,2,2]); ctx.fill();
    }
    // wall shelf
    { const shx=ox+W*0.12, shy=H*0.25, shw=W*0.24, shth=H*0.018;
      ctx.fillStyle='#B8825A'; ctx.beginPath();
      ctx.roundRect(shx,shy,shw,shth,4); ctx.fill();
      ctx.strokeStyle='#8B5530'; ctx.lineWidth=1; ctx.stroke();
      // tiny items on shelf
      ctx.fillStyle='#E87060'; ctx.beginPath();
      ctx.arc(shx+shw*0.18,shy-H*0.028,H*0.018,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#70A860'; ctx.beginPath();
      ctx.arc(shx+shw*0.42,shy-H*0.032,H*0.022,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#6888C8';
      ctx.beginPath(); ctx.roundRect(shx+shw*0.62,shy-H*0.055,H*0.022,H*0.055,3); ctx.fill();
      ctx.beginPath(); ctx.roundRect(shx+shw*0.72,shy-H*0.06,H*0.022,H*0.06,3); ctx.fill();
    }
  }
  else if (scene.id==='study') {
    // desk surface edge highlight + front panel
    ctx.fillStyle='rgba(220,175,90,0.3)';
    ctx.fillRect(ox,gy-H*0.01,W,H*0.01);
    ctx.fillStyle='rgba(55,30,5,0.22)';
    ctx.fillRect(ox,gy,W,H*0.007);
    // wall frame / poster
    { const px=ox+W*0.36, py=H*0.07, pw=W*0.13, ph=H*0.19;
      ctx.fillStyle='#F8F2E8'; ctx.strokeStyle='#C8AE80'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.roundRect(px,py,pw,ph,4); ctx.fill(); ctx.stroke();
      ctx.strokeStyle='#B09060'; ctx.lineWidth=1.5;
      // simple mountain sketch inside poster
      ctx.fillStyle='#E0D5C0';
      ctx.beginPath(); ctx.moveTo(px+pw*0.1,py+ph*0.85);
      ctx.lineTo(px+pw*0.38,py+ph*0.38); ctx.lineTo(px+pw*0.55,py+ph*0.55);
      ctx.lineTo(px+pw*0.72,py+ph*0.28); ctx.lineTo(px+pw*0.9,py+ph*0.85);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#C8D4E0';
      ctx.beginPath(); ctx.arc(px+pw*0.22,py+ph*0.22,pw*0.14,0,Math.PI*2); ctx.fill(); ctx.stroke();
    }
    // sticky notes on wall
    for (const [dx,col,rot] of [
      [0,'#FFEE88',0.04],[0.08,'#FFB5C8',-0.03],[0.155,'#B8E8A0',0.02]
    ]) {
      ctx.save(); ctx.globalAlpha=0.88;
      ctx.translate(ox+W*0.55+dx*W, H*0.12);
      ctx.rotate(rot);
      ctx.fillStyle=col; ctx.shadowColor='rgba(0,0,0,0.1)'; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.rect(0,0,W*0.055,H*0.058); ctx.fill();
      ctx.restore();
    }
    // open laptop (left side)
    { const lx=ox+W*0.16, ly=gy, lw=W*0.24;
      // base / keyboard
      ctx.fillStyle='#CACAC5'; ctx.strokeStyle='#A5A5A0'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(lx,ly-H*0.022,lw,H*0.022,[3,3,7,7]); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#B0B0AA';
      ctx.beginPath(); ctx.roundRect(lx+lw*0.33,ly-H*0.016,lw*0.26,H*0.011,3); ctx.fill();
      // screen
      ctx.fillStyle='#222230'; ctx.strokeStyle='#18181E'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(lx+lw*0.04,ly-H*0.022-H*0.145,lw*0.92,H*0.145,[8,8,2,2]);
      ctx.fill(); ctx.stroke();
      // screen display gradient
      const sg=ctx.createLinearGradient(lx+lw*0.06,ly-H*0.155,lx+lw*0.94,ly-H*0.032);
      sg.addColorStop(0,'#5898B8'); sg.addColorStop(1,'#306880');
      ctx.fillStyle=sg;
      ctx.beginPath(); ctx.roundRect(lx+lw*0.07,ly-H*0.022-H*0.132,lw*0.86,H*0.112,[5,5,1,1]); ctx.fill();
      // screen content lines (code suggestion)
      ctx.fillStyle='rgba(255,255,255,0.2)';
      for (const [i,w] of [[0,0.52],[1,0.68],[2,0.38],[3,0.58]]) {
        ctx.beginPath(); ctx.roundRect(lx+lw*0.1,ly-H*0.022-H*0.105+i*H*0.024,lw*w,H*0.011,2); ctx.fill();
      }
      // laptop hinge shadow
      ctx.fillStyle='rgba(0,0,0,0.12)';
      ctx.beginPath(); ctx.roundRect(lx+lw*0.04,ly-H*0.023,lw*0.92,H*0.004,1); ctx.fill();
    }
    // coffee mug
    { const mx=ox+W*0.585, my=gy, mw=W*0.052, mh=H*0.072;
      // body
      ctx.fillStyle='#E8D8C8'; ctx.strokeStyle='#C8A888'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(mx,my-mh,mw,mh,[7,7,4,4]); ctx.fill(); ctx.stroke();
      // stripe decoration
      ctx.fillStyle='rgba(150,90,70,0.4)';
      ctx.beginPath(); ctx.roundRect(mx+mw*0.12,my-mh*0.62,mw*0.76,mh*0.28,2); ctx.fill();
      // handle
      ctx.strokeStyle='#C8A888'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(mx+mw+mw*0.08,my-mh*0.44,mh*0.21,-0.65,0.65); ctx.stroke();
      // rim / top
      ctx.fillStyle='rgba(220,185,155,0.6)';
      ctx.beginPath(); ctx.ellipse(mx+mw*0.5,my-mh,mw*0.5,mh*0.07,0,0,Math.PI*2); ctx.fill();
      // steam
      ctx.strokeStyle='rgba(210,190,170,0.5)'; ctx.lineWidth=1.8; ctx.lineCap='round';
      for (const [dx,flip] of [[-mw*0.08,1],[mw*0.1,-1]]) {
        ctx.beginPath();
        ctx.moveTo(mx+mw*0.5+dx, my-mh-H*0.004);
        ctx.bezierCurveTo(mx+mw*0.5+dx+flip*mw*0.12,my-mh-H*0.022,
                          mx+mw*0.5+dx-flip*mw*0.12,my-mh-H*0.044,
                          mx+mw*0.5+dx,my-mh-H*0.062); ctx.stroke();
      }
    }
    // desk lamp (right side)
    { const lx=ox+W*0.85, ly=gy, s=H*0.19;
      // warm glow pool on desk
      const glow=ctx.createRadialGradient(lx-s*0.22,ly-H*0.01,0,lx-s*0.22,ly-H*0.01,s*0.38);
      glow.addColorStop(0,'rgba(255,210,100,0.2)'); glow.addColorStop(1,'rgba(255,190,60,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(lx-s*0.22,ly-H*0.01,s*0.38,0,Math.PI*2); ctx.fill();
      // base disc
      ctx.fillStyle='#707480'; ctx.strokeStyle='#545660'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.ellipse(lx,ly-s*0.03,s*0.08,s*0.025,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
      // pole
      ctx.strokeStyle='#808490'; ctx.lineWidth=s*0.042; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(lx,ly-s*0.05); ctx.lineTo(lx-s*0.05,ly-s*0.5); ctx.stroke();
      // arm
      ctx.beginPath(); ctx.moveTo(lx-s*0.05,ly-s*0.5); ctx.lineTo(lx-s*0.3,ly-s*0.58); ctx.stroke();
      // shade (trapezoid)
      ctx.fillStyle='#D4A828'; ctx.strokeStyle='#B48818'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(lx-s*0.3-s*0.07,ly-s*0.55);
      ctx.lineTo(lx-s*0.3+s*0.07,ly-s*0.55);
      ctx.lineTo(lx-s*0.3+s*0.15,ly-s*0.42);
      ctx.lineTo(lx-s*0.3-s*0.15,ly-s*0.42);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // shade inner highlight
      ctx.fillStyle='rgba(255,235,140,0.38)';
      ctx.beginPath();
      ctx.moveTo(lx-s*0.3-s*0.045,ly-s*0.54);
      ctx.lineTo(lx-s*0.3+s*0.045,ly-s*0.54);
      ctx.lineTo(lx-s*0.3+s*0.09, ly-s*0.46);
      ctx.lineTo(lx-s*0.3-s*0.09, ly-s*0.46);
      ctx.closePath(); ctx.fill();
      // bulb
      ctx.fillStyle='#FFFACC';
      ctx.beginPath(); ctx.arc(lx-s*0.3,ly-s*0.42,s*0.03,0,Math.PI*2); ctx.fill();
    }
    // mini plant pot (far right corner)
    { const px=ox+W*0.93, py=gy, pr=W*0.028;
      // pot
      ctx.fillStyle='#B07858'; ctx.strokeStyle='#8A5838'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(px-pr*0.8,py); ctx.lineTo(px+pr*0.8,py);
