      ctx.lineTo(px+pr*0.6,py-H*0.042); ctx.lineTo(px-pr*0.6,py-H*0.042);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // soil
      ctx.fillStyle='#5A3820';
      ctx.beginPath(); ctx.ellipse(px,py-H*0.042,pr*0.6,H*0.01,0,0,Math.PI*2); ctx.fill();
      // leaves (simple succulent)
      for (const [a,r,col] of [
        [-0.5,H*0.04,'#6AA858'],[-0.1,H*0.048,'#82C068'],[0.35,H*0.042,'#6AA858'],
        [-0.9,H*0.036,'#82C068'],[0.7,H*0.038,'#6AA858']
      ]) {
        ctx.fillStyle=col;
        ctx.beginPath();
        ctx.ellipse(px+Math.cos(a)*pr*0.3,py-H*0.042-r*0.5+H*0.004,pr*0.28,r*0.55,a,0,Math.PI*2);
        ctx.fill();
      }
    }
  }
}

function _sunsetTree(x,base,h) {
  ctx.beginPath();
  ctx.moveTo(x,base-h*0.02);
  ctx.lineTo(x-h*0.17,base-h*0.38); ctx.lineTo(x-h*0.1,base-h*0.38);
  ctx.lineTo(x-h*0.21,base-h*0.65); ctx.lineTo(x-h*0.07,base-h*0.65);
  ctx.lineTo(x-h*0.14,base-h*0.88); ctx.lineTo(x,base-h);
  ctx.lineTo(x+h*0.14,base-h*0.88);
  ctx.lineTo(x+h*0.07,base-h*0.65); ctx.lineTo(x+h*0.21,base-h*0.65);
  ctx.lineTo(x+h*0.1,base-h*0.38);  ctx.lineTo(x+h*0.17,base-h*0.38);
  ctx.closePath(); ctx.fill();
  ctx.fillRect(x-h*0.045,base-h*0.12,h*0.09,h*0.12);
}

function _bgFlower(x,y,r) {
  for (let i=0;i<5;i++) {
    const a=(i/5)*Math.PI*2;
    ctx.beginPath(); ctx.ellipse(x+Math.cos(a)*r*1.5,y+Math.sin(a)*r*1.5,r,r*0.6,a,0,Math.PI*2);
    ctx.fillStyle=i%2===0?'#FF99CC':'#FFB3DD'; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(x,y,r*0.75,0,Math.PI*2); ctx.fillStyle='#FFEE44'; ctx.fill();
}

function _candyCane(x,y) {
  const s=H*0.2;
  ctx.save(); ctx.lineCap='round';
  ctx.strokeStyle='#FFF5F5'; ctx.lineWidth=s*0.13;
  ctx.beginPath(); ctx.moveTo(x,y+s*0.5); ctx.lineTo(x,y-s*0.2);
  ctx.arc(x,y-s*0.2,s*0.22,Math.PI,0,false); ctx.stroke();
  ctx.strokeStyle='#FF3355'; ctx.lineWidth=s*0.045;
  ctx.setLineDash([s*0.09,s*0.1]);
  ctx.beginPath(); ctx.moveTo(x,y+s*0.5); ctx.lineTo(x,y-s*0.2);
  ctx.arc(x,y-s*0.2,s*0.22,Math.PI,0,false); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function _starShape(x,y,r) {
  ctx.beginPath();
  for (let i=0;i<5;i++) {
    const oa=(i/5)*Math.PI*2-Math.PI/2, ia=oa+Math.PI/5;
    i===0?ctx.moveTo(x+Math.cos(oa)*r,y+Math.sin(oa)*r):ctx.lineTo(x+Math.cos(oa)*r,y+Math.sin(oa)*r);
    ctx.lineTo(x+Math.cos(ia)*r*0.42,y+Math.sin(ia)*r*0.42);
  }
  ctx.closePath(); ctx.fill();
}

function _drawLightningBolt(x,y) {
  const s=H*0.09;
  ctx.save();
  ctx.fillStyle='rgba(255,240,80,0.9)';
  ctx.strokeStyle='rgba(255,220,20,1)';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x-s*0.22,y+s*0.44);
  ctx.lineTo(x+s*0.04,y+s*0.42);
  ctx.lineTo(x-s*0.24,y+s*0.92);
  ctx.lineTo(x+s*0.3,y+s*0.4);
  ctx.lineTo(x+s*0.04,y+s*0.42);
  ctx.lineTo(x+s*0.22,y);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

// ── Rain ──────────────────────────────────────────────────
function drawRain() {
  if (rainTimer<=0) return;
  ctx.save();
  ctx.fillStyle='rgba(80,120,180,0.07)'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(130,180,240,0.62)'; ctx.lineWidth=1.5; ctx.lineCap='round';
  for (const d of rainDrops) {
    ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-2,d.y+d.len); ctx.stroke();
  }
  ctx.restore();
}

// ── Scene indicator dots ──────────────────────────────────
function drawSceneIndicator() {
  const n=SCENES.length;
  const r=Math.max(3,H*0.006);
  const sp=r*3.5;
  const cy=H*0.945;
  for (let i=0;i<n;i++) {
    ctx.beginPath(); ctx.arc(W/2-(n-1)*sp/2+i*sp,cy,r,0,Math.PI*2);
    ctx.fillStyle=i===sceneIdx?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.3)';
    ctx.fill();
  }
}

// ── Input state ───────────────────────────────────────────
let draggedFood=null, draggedAcc=null, lastPetX=null, draggedEar=-1;

// ── Scene helpers ─────────────────────────────────────────
function rebuildFoods(idx) {
  draggedFood=null;
  foods.length=0;
  SCENES[idx!==undefined?idx:sceneIdx].items.forEach(item=>foods.push(new Food(item.type,W*item.rx,H*item.ry)));
}

function handleSceneInteraction(x,y) {
  const sid=SCENES[sceneIdx].id;
  if (sid==='spring'||sid==='sunset') {
    if (cloudHit(x,y)) { if(rainTimer<=0)initRain(); rainTimer=120; return true; }
  } else if (sid==='rainy') {
    if (Math.hypot(x-LIGHTNING.rx*W,y-LIGHTNING.ry*H)<H*0.07) { lightningFlash=18; return true; }
  } else if (sid==='night') {
    if (NIGHT_STARS.some(([rx,ry])=>Math.hypot(x-rx*W,y-ry*H)<H*0.028)) { starEyeTimer=90; return true; }
  }
  return false;
}

function onSceneExit(idx) {
  if (SCENES[idx].id==='rainy') { rainTimer=0; rainDrops=[]; }
  starEyeTimer=0; lightningFlash=0;
}

function onSceneEnter(idx) {
  rebuildFoods();
  if (SCENES[idx].id==='rainy') {
    if (rainTimer<=0) initRain();
    rainTimer=Math.max(rainTimer,120);
  }
}

// ── Init ──────────────────────────────────────────────────
const pig=new Pig(W/2);
const foods=[];
rebuildFoods();
const accessories=[
  new Accessory('crown',        0),
  new Accessory('ribbon',       1),
  new Accessory('ribbon_purple',2),
  new Accessory('glasses',      3),
  new Accessory('beanie',       4),
  new Accessory('scarf',        5),
];
updatePanelMaxScroll();

function getXY(e) { const t=e.changedTouches?e.changedTouches[0]:e; return [t.clientX,t.clientY]; }

// ── Petting ───────────────────────────────────────────────
function checkPetting(x,y) {
  if (Math.hypot(x-pig.cx,y-(pig.cy-pig.r*0.55))<pig.r*0.45) {
    const moved=lastPetX!==null?Math.abs(x-lastPetX):0;
    if (moved>3) pig.petLevel=Math.min(1,pig.petLevel+0.055);
    lastPetX=x;
  } else { lastPetX=null; }
}

// ── Input handlers ────────────────────────────────────────
function onDown(x,y) {
  swipeStartX=null; swipeLiveX=x;
  if (handleSceneInteraction(x,y)) return;
  for (const a of accessories) { if(a.hitTest(x,y)){draggedAcc=a;a.startDrag();return;} }
  const pw=Math.min(W*0.13,72);
  if (x<8+pw&&y>H*0.04&&y<H*0.04+H*0.44) {
    panelDragging=true; panelDragStartY=y; panelScrollStart=panelScroll; return;
  }
  const eIdx=pig.earHitTest(x,y);
  if (eIdx>=0) { draggedEar=eIdx; pig.startEarDrag(eIdx); return; }
  for (const f of foods) { if(f.hitTest(x,y)){draggedFood=f;f.startDrag();return;} }
  if (pig.pointerDown(x,y)) { playBoing(); return; }
  // Nothing grabbed → track as potential scene swipe
  swipeStartX=x;
}

function onMove(x,y) {
  if (panelDragging) {
    panelScroll=Math.max(0,Math.min(panelMaxScroll,panelScrollStart-(y-panelDragStartY))); return;
  }
  checkPetting(x,y);
  swipeLiveX=x;
  if (draggedAcc) { draggedAcc.moveTo(x,y); }
  else if (draggedEar>=0) { pig.moveEarDrag(draggedEar,x,y); }
  else if (draggedFood) {
    draggedFood.moveTo(x,y);
    if (draggedFood.type==='flower') {
      if (Math.hypot(x-pig.cx,y-(pig.cy+pig.r*0.2))<pig.r*0.48) {
        pig.sniff(); showBubble('flower'); draggedFood.endDrag(); draggedFood=null;
      }
    } else {
      if (Math.hypot(x-pig.cx,y-(pig.cy+pig.r*0.2))<pig.r*0.5) {
        const _t=draggedFood.type; draggedFood.markEaten(); pig.eat(_t);
        if (MSGS[_t]) showBubble(_t); draggedFood=null;
      }
    }
  } else { pig.pointerMove(x,y); }
}

function onUp(x,y) {
  if (panelDragging) { panelDragging=false; return; }
  if (draggedAcc)      { draggedAcc.endDrag(); draggedAcc=null; }
  else if (draggedEar>=0) { pig.endEarDrag(); draggedEar=-1; }
  else if (draggedFood){ draggedFood.endDrag(); draggedFood=null; }
  else if (pig.active) { pig.pointerUp(x,y); }
  else if (swipeStartX!==null) {
    const delta=x-swipeStartX;
    swipeStartX=null;
    // Commit scene switch if past threshold, else spring back
    if (Math.abs(delta)>W*0.22) {
      onSceneExit(sceneIdx);
      const nextIdx=delta<0?(sceneIdx+1)%SCENES.length:(sceneIdx-1+SCENES.length)%SCENES.length;
      rebuildFoods(nextIdx);
      sceneOffsetPx=delta;
      sceneOffsetTarget=delta<0?-W:W;
    } else {
      sceneOffsetPx=delta;
      sceneOffsetTarget=0;
    }
  }
}

// ── Events ────────────────────────────────────────────────
canvas.addEventListener('mousedown', e=>onDown(...getXY(e)));
canvas.addEventListener('mousemove', e=>onMove(...getXY(e)));
canvas.addEventListener('mouseup',   e=>onUp(...getXY(e)));
canvas.addEventListener('mouseleave',()=>{
  swipeStartX=null;
  if (sceneOffsetPx!==0) sceneOffsetTarget=0;
  panelDragging=false;
  if(draggedAcc){draggedAcc.endDrag();draggedAcc=null;}
  if(draggedEar>=0){pig.endEarDrag();draggedEar=-1;}
  if(draggedFood){draggedFood.endDrag();draggedFood=null;}
  pig.pointerUp();
});
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(...getXY(e));},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();onMove(...getXY(e));},{passive:false});
canvas.addEventListener('touchend',  e=>{e.preventDefault();onUp(...getXY(e));},{passive:false});
canvas.addEventListener('wheel',e=>{
  const pw=Math.min(W*0.13,72);
  if(e.clientX<8+pw&&e.clientY>H*0.04&&e.clientY<H*0.04+H*0.44){
    panelScroll=Math.max(0,Math.min(panelMaxScroll,panelScroll+e.deltaY*0.4));
    e.preventDefault();
  }
},{passive:false});

window.addEventListener('resize',()=>{
  resize();
  pig.resetAt(W/2);
  rebuildFoods();
  accessories.forEach(a=>a._syncPanel());
  updatePanelMaxScroll();
});

// ── Loop ──────────────────────────────────────────────────
(function loop() {
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);

  // Animate scene offset
  if (sceneOffsetPx!==sceneOffsetTarget) {
    const diff=sceneOffsetTarget-sceneOffsetPx;
    sceneOffsetPx+=diff*0.16;
    if (Math.abs(diff)<1) {
      sceneOffsetPx=sceneOffsetTarget;
      if (sceneOffsetTarget!==0) {
        sceneIdx=sceneOffsetTarget<0?(sceneIdx+1)%SCENES.length:(sceneIdx-1+SCENES.length)%SCENES.length;
        sceneOffsetPx=0; sceneOffsetTarget=0;
        onSceneEnter(sceneIdx);
      }
    }
  }

  // Live swipe delta (while finger is held)
  const liveSwipe=swipeStartX!==null?(swipeLiveX-swipeStartX):0;
  const disp=sceneOffsetPx+liveSwipe;

  // Draw scenes (prev / current / next) as horizontal strip
  const prev=SCENES[(sceneIdx-1+SCENES.length)%SCENES.length];
  const curr=SCENES[sceneIdx];
  const next=SCENES[(sceneIdx+1)%SCENES.length];
  if (disp>1)  drawSceneBackground(prev,disp-W);
  drawSceneBackground(curr,disp);
  if (disp<-1) drawSceneBackground(next,disp+W);

  // Rain overlay (global)
  drawRain();
  drawAccessoryPanel();

  // Rain update
  if (rainTimer>0) {
    rainTimer--;
    for (const d of rainDrops) {
      d.y+=d.speed;
      if (d.y>H*0.65) { d.y=-d.len; d.x=Math.random()*W; }
    }
  }
  // Rainy scene: keep rain going (only while still on rainy, not during swipe-away)
  if (SCENES[sceneIdx].id==='rainy' && sceneOffsetTarget===0) {
    if (rainTimer<=0) initRain();
    rainTimer=Math.max(rainTimer,60);
  }

  starPulse++;

  // Lightning flash overlay
  if (lightningFlash>0) {
    lightningFlash--;
    ctx.save();
    ctx.globalAlpha=lightningFlash/18*0.65;
    ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  foods.forEach(f=>f.update());
  pig.update();

  // Panel items (clipped + scrolled)
  const pw=Math.min(W*0.13,72), ph=H*0.44;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(8,H*0.04,pw,ph,18); ctx.clip();
  ctx.translate(0,-panelScroll);
  accessories.forEach(a=>{ if(!a.worn&&!a.dragging) a.draw(ctx); });
  ctx.restore();

  foods.forEach(f=>{ if(f!==draggedFood) f.draw(ctx); });
  pig.draw(ctx);
  accessories.forEach(a=>{ if(a.worn&&!a.dragging) a.draw(ctx); });
  if(draggedFood) draggedFood.draw(ctx);
  if(draggedAcc)  draggedAcc.draw(ctx);

  drawSceneIndicator();
})();

const _bubbleEl=document.getElementById('bubble');
const _bubbleText=document.getElementById('bubble-text');
let _bubbleTimer=null;
function showBubble(category) {
  const list=MSGS[category];
  if (!list) return;
  _bubbleText.textContent=list[Math.floor(Math.random()*list.length)];
  const bx=pig.cx, by=pig.cy-pig.r*1.5;
  _bubbleEl.style.left=bx+'px'; _bubbleEl.style.top=by+'px';
  _bubbleEl.style.transform='translateX(-50%) translateY(-100%)';
  _bubbleEl.classList.remove('visible');
  void _bubbleEl.offsetWidth;
  _bubbleEl.classList.add('visible');
  if (_bubbleTimer) clearTimeout(_bubbleTimer);
  _bubbleTimer=setTimeout(()=>_bubbleEl.classList.remove('visible'),2600);
}
