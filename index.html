<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>돼지 힐링 🐷</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; background: #87CEEB; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }
    #bubble {
      position: fixed;
      left: 50%; top: 40%;
      transform: translateX(-50%) translateY(-100%);
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 18px;
      padding: 11px 17px;
      font-family: 'Jua', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      box-shadow: 0 6px 28px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.07);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.28s ease;
      max-width: 200px;
      text-align: center;
      line-height: 1.55;
      white-space: pre-line;
      z-index: 10;
    }
    #bubble.visible { opacity: 1; }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-top: 9px solid rgba(255,255,255,0.82);
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="bubble"><span id="bubble-text"></span></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
</script>
<script src="js/audio.js"></script>
<script src="js/condition.js"></script>
<script src="js/constants.js"></script>
<script src="js/scenes.js"></script>
<script src="js/pig.js"></script>
<script src="js/food.js"></script>
<script src="js/accessory.js"></script>
<script src="js/draw.js"></script>
<script src="js/input.js"></script>
<script src="js/loop.js"></script>
</body>
</html>
